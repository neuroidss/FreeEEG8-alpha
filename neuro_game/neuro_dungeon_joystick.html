<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neuro Phase Engine: Skill Tuner</title>
    <style>
        body { margin: 0; background: #050505; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        
        #ui { 
            position: absolute; top: 10px; left: 10px; z-index: 10; 
            background: rgba(0,0,0,0.85); padding: 15px; border: 2px solid #0f0; 
            border-radius: 8px; pointer-events: auto; width: 220px;
        }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20; text-align: center;
        }

        button {
            background: #000; color: #0f0; border: 2px solid #0f0;
            padding: 20px 40px; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 20px;
            box-shadow: 0 0 15px #0f0; transition: 0.2s;
        }
        button:hover { background: #0f0; color: #000; }

        .stat { font-size: 14px; margin-bottom: 8px; color: #0f0; display: flex; justify-content: space-between;}
        
        /* Стили ползунка */
        .slider-box { margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #0f0; }

        #radar { width: 100px; height: 100px; border: 1px solid #444; border-radius: 50%; margin: 10px auto; position: relative; background: #111; }
        #pointer { width: 6px; height: 6px; background: #f0f; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px #f0f; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">FLOOR: <span id="lbl-floor" style="color:#fff">1</span></div>
    
    <div id="radar"><div id="pointer"></div></div>

    <div class="slider-box">
        <div class="stat" style="font-size: 11px;">
            <span>CALM</span>
            <span>REACTIVE LEVEL</span>
            <span>CYBER</span>
        </div>
        <input type="range" id="skill-slider" min="0.05" max="1.2" step="0.05" value="0.4">
        <div id="lbl-skill" style="text-align: center; font-size: 18px; color: #fff; margin-top: 5px;">0.40</div>
    </div>
</div>

<div id="overlay">
    <h1 style="color:#fff; text-shadow: 0 0 20px #0f0;">PHASE TENSOR v5</h1>
    <p style="color:#888; font-size: 18px; max-width: 600px; line-height: 1.4;">
        Тензорное поле 28 когерентностей.<br>
        Отрегулируйте уровень реактивности под себя.
    </p>
    <button id="btn-start">ACTIVATE ENGINE</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// === 1. ГЕОМЕТРИЯ (ТВОИ УГЛЫ) ===
const RADIUS = 10;
const ANGLES = [-72, -36, 36, 72, 108, 144, -144, -108].map(d => d * Math.PI / 180);
const ELECTRODES = ANGLES.map(a => ({ x: Math.cos(a) * RADIUS, y: Math.sin(a) * RADIUS }));

const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const DATA_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const CMD_UUID     = "c0de0001-36e1-4688-b7f5-ea07361b26a8";
const UV_SCALE = (1.2 / 4.0 / 8388607.0) * 1e6;
const BUF_SIZE = 256;

let isConnected = false;
let eegBuffer = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));
let ctrl = { x: 0, y: 0, torque: 0 };
let player = { x: 1.5, y: 1.5, r: 0.35, angle: 0 };
const cellSize = 80;

// Настройки сложности (динамические)
let skill = 0.4;

// === 2. МАТЕМАТИКА (FFT и ciPLV) ===
function reverseBits(x, n) {
    let res = 0;
    for (let i = 0; (1 << i) < n; i++) { res = (res << 1) | (x & 1); x >>= 1; }
    return res;
}
function fft(re, im) {
    const n = re.length;
    for (let i = 0; i < n; i++) {
        let j = reverseBits(i, n);
        if (j > i) { let tr=re[i], ti=im[i]; re[i]=re[j]; im[i]=im[j]; re[j]=tr; im[j]=ti; }
    }
    for (let step = 2; step <= n; step <<= 1) {
        let half = step >> 1, theta = -2 * Math.PI / step;
        let wr = Math.cos(theta), wi = Math.sin(theta);
        for (let i = 0; i < n; i += step) {
            let ar = 1, ai = 0;
            for (let j = 0; j < half; j++) {
                let i1 = i + j, i2 = i + j + half;
                let tr = ar * re[i2] - ai * im[i2], ti = ar * im[i2] + ai * re[i2];
                re[i2] = re[i1] - tr; im[i2] = im[i1] - ti; re[i1] += tr; im[i1] += ti;
                let nar = ar * wr - ai * wi, nai = ar * wi + ai * wr;
                ar = nar; ai = nai;
            }
        }
    }
}

function get_ciPLV(idxA, idxB, spectra, b1, b2) {
    let sum_re = 0, sum_im = 0, count = 0;
    for (let k = b1; k <= b2; k++) {
        let reA = spectra[idxA].re[k], imA = spectra[idxA].im[k];
        let reB = spectra[idxB].re[k], imB = spectra[idxB].im[k];
        let magA = Math.sqrt(reA*reA + imA*imA) || 1e-6;
        let magB = Math.sqrt(reB*reB + imB*imB) || 1e-6;
        let uA_re = reA / magA, uA_im = imA / magA;
        let uB_re = reB / magB, uB_im = -imB / magB; 
        sum_re += (uA_re * uB_re - uA_im * uB_im);
        sum_im += (uA_re * uB_im + uA_im * uB_re);
        count++;
    }
    let m_re = sum_re / count, m_im = sum_im / count;
    let denom = Math.sqrt(Math.max(0, 1.0 - m_re * m_re));
    return (denom < 0.001) ? 0 : m_im / denom;
}

// === 3. АУДИО (Bass Engine) ===
class ciPLVAudio {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.osc = this.ctx.createOscillator();
        this.osc.type = 'sawtooth';
        this.osc.frequency.value = 50; 
        this.filter = this.ctx.createBiquadFilter();
        this.filter.type = 'lowpass';
        this.filter.Q.value = 8;
        this.gain = this.ctx.createGain();
        this.gain.gain.value = 0;
        this.pan = this.ctx.createStereoPanner();
        this.osc.connect(this.filter).connect(this.gain).connect(this.pan).connect(this.ctx.destination);
        this.osc.start();
    }
    update(vx, vy, tq) {
        if(this.ctx.state === 'suspended') this.ctx.resume();
        const t = this.ctx.currentTime;
        let mag = Math.sqrt(vx*vx + vy*vy);
        this.filter.frequency.setTargetAtTime(80 + mag * 2000, t, 0.1);
        this.gain.gain.setTargetAtTime(Math.min(0.6, mag * 2.5), t, 0.1);
        this.pan.pan.setTargetAtTime(Math.max(-1, Math.min(1, vx * 4)), t, 0.1);
        this.osc.frequency.setTargetAtTime(50 + Math.abs(tq) * 20, t, 0.1);
    }
}
let audio;

// === 4. ЛАБИРИНТ ===
class Maze {
    constructor(dim) {
        this.dim = dim; this.grid = Array.from({length: dim}, () => Array(dim).fill(1));
        this.gen(1, 1); this.grid[dim-2][dim-2] = 2; 
    }
    gen(x, y) {
        this.grid[y][x] = 0;
        [[0,1],[0,-1],[1,0],[-1,0]].sort(()=>Math.random()-0.5).forEach(([dx, dy]) => {
            let nx=x+dx*2, ny=y+dy*2;
            if(nx>0 && nx<this.dim-1 && ny>0 && ny<this.dim-1 && this.grid[ny][nx]===1) {
                this.grid[y+dy][x+dx] = 0; this.gen(nx, ny);
            }
        });
    }
}
let maze = new Maze(9);

// === 5. ЦИКЛ ИГРЫ ===
function gameLoop() {
    if(!isConnected) return;

    // CAR
    let centered = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));
    for(let t=0; t<BUF_SIZE; t++) {
        let avg = 0; for(let c=0; c<8; c++) avg += eegBuffer[c][t];
        avg /= 8;
        for(let c=0; c<8; c++) centered[c][t] = eegBuffer[c][t] - avg;
    }

    // FFT
    let spectra = [];
    for(let c=0; c<8; c++) {
        let re = new Float32Array(centered[c]), im = new Float32Array(BUF_SIZE);
        fft(re, im);
        spectra.push({re, im});
    }

    // РАСЧЕТ ТЕНЗОРА
    let vx = 0, vy = 0, tq = 0;
    for(let i=0; i<8; i++) {
        for(let j=i+1; j<8; j++) {
            let val = get_ciPLV(i, j, spectra, 18, 36); 
            let dx = ELECTRODES[j].x - ELECTRODES[i].x;
            let dy = ELECTRODES[j].y - ELECTRODES[i].y;
            vx += val * dx;
            vy += val * dy;
            tq += val * (ELECTRODES[i].x * dy - ELECTRODES[i].y * dx);
        }
    }

    // === ДИНАМИЧЕСКАЯ ФИЗИКА ОТ ПОЛЗУНКА ===
    // Чем меньше skill, тем больше инерция (smooth) и меньше усиление (gain)
    let smooth = 0.99 - (skill * 0.1); // от 0.985 до 0.87
    let gain = skill * 2.0;

    ctrl.x = ctrl.x * smooth + vx * gain * (1 - smooth);
    ctrl.y = ctrl.y * smooth + vy * gain * (1 - smooth);
    ctrl.torque = ctrl.torque * smooth + tq * gain * 0.05 * (1 - smooth);

    // Радар
    document.getElementById('pointer').style.left = (50 + ctrl.x * 5) + '%';
    document.getElementById('pointer').style.top = (50 + ctrl.y * 5) + '%';

    // Танк
    player.angle += ctrl.torque * 0.15;
    let speed = -ctrl.y * 0.25; 
    let dx = Math.sin(player.angle) * speed;
    let dy = -Math.cos(player.angle) * speed;

    const hit = (tx, ty) => {
        let gx = Math.floor(tx), gy = Math.floor(ty);
        if(gy<0||gy>=maze.dim||gx<0||gx>=maze.dim) return true;
        return maze.grid[gy][gx] === 1;
    };
    if(!hit(player.x + dx, player.y)) player.x += dx;
    if(!hit(player.x, player.y + dy)) player.y += dy;

    if(maze.grid[Math.floor(player.y)][Math.floor(player.x)] === 2) {
        let fl = parseInt(document.getElementById('lbl-floor').innerText) + 1;
        document.getElementById('lbl-floor').innerText = fl;
        maze = new Maze(9 + fl*2); player.x = player.y = 1.5;
    }

    audio.update(ctrl.x, ctrl.y, ctrl.torque);
    render();
    requestAnimationFrame(gameLoop);
}

function render() {
    const cvs = document.getElementById('gameCanvas');
    const ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,cvs.width,cvs.height);
    
    ctx.save();
    ctx.translate(cvs.width/2, cvs.height/2);
    ctx.rotate(-player.angle);
    ctx.translate(-player.x*cellSize, -player.y*cellSize);
    
    for(let r=0; r<maze.dim; r++){
        for(let c=0; c<maze.dim; c++){
            if(maze.grid[r][c] === 1) {
                ctx.fillStyle = '#1a1a20'; ctx.fillRect(c*cellSize, r*cellSize, cellSize, cellSize);
                ctx.strokeStyle = '#0f0'; ctx.lineWidth = 1; ctx.strokeRect(c*cellSize, r*cellSize, cellSize, cellSize);
            } else if(maze.grid[r][c] === 2) {
                ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(c*cellSize+cellSize/2, r*cellSize+cellSize/2, cellSize/3, 0, Math.PI*2); ctx.fill();
            }
        }
    }
    ctx.restore();

    ctx.save();
    ctx.translate(cvs.width/2, cvs.height/2);
    ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(0, 0, cellSize*player.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(0, -cellSize*player.r - 10); ctx.lineTo(-7, -cellSize*player.r + 3); ctx.lineTo(7, -cellSize*player.r + 3); ctx.fill();
    ctx.restore();
}

// === 6. СЛАЙДЕР И BLE ===
document.getElementById('skill-slider').oninput = (e) => {
    skill = parseFloat(e.target.value);
    document.getElementById('lbl-skill').innerText = skill.toFixed(2);
};

document.getElementById('btn-start').onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services:[SERVICE_UUID] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const cmdChar = await service.getCharacteristic(CMD_UUID);
        const dataChar = await service.getCharacteristic(DATA_UUID);

        let pga = 2, val = (pga << 12) | (pga << 8) | (pga << 4) | pga;
        await cmdChar.writeValue(new Uint8Array([0x04, (val>>8)&0xFF, val&0xFF]));
        await new Promise(r => setTimeout(r, 100));
        await cmdChar.writeValue(new Uint8Array([0x05, (val>>8)&0xFF, val&0xFF]));

        await dataChar.startNotifications();
        dataChar.addEventListener('characteristicvaluechanged', (e) => {
            let b = new Uint8Array(e.target.value.buffer);
            if(b[0] === 0xA0) {
                for(let i=0; i<8; i++) {
                    let s = 2 + i*3;
                    let v = (b[s]<<16) | (b[s+1]<<8) | b[s+2];
                    if(v & 0x800000) v -= 0x1000000;
                    eegBuffer[i].set(eegBuffer[i].subarray(1));
                    eegBuffer[i][BUF_SIZE-1] = v * UV_SCALE;
                }
            }
        });
        audio = new ciPLVAudio();
        document.getElementById('overlay').style.display = 'none';
        isConnected = true;
        gameLoop();
    } catch(e) { alert(e); }
};
</script>
</body>
</html>
