<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neuro Psytrance Mandala</title>
    <style>
        body { 
            margin: 0; background-color: #000; color: #0ff; 
            font-family: 'Courier New', monospace; overflow: hidden; 
            width: 100vw; height: 100vh; position: fixed; 
        }
        canvas { display: block; width: 100%; height: 100%; z-index: 1; position: absolute; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 10; transition: opacity 0.5s;
        }
        
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        select {
            background: rgba(0, 255, 255, 0.1); color: #0ff; border: 2px solid #0ff;
            padding: 10px 20px; font-size: 18px; font-weight: bold; border-radius: 10px;
            outline: none; cursor: pointer;
        }
        select option { background: #000; color: #0ff; }
        
        button {
            background: rgba(0, 255, 255, 0.1); color: #0ff; border: 2px solid #0ff;
            padding: 20px 40px; font-size: 20px; font-weight: bold; border-radius: 50px;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(5px); margin: 10px;
        }
        button:active { background: #0ff; color: #000; }
        
        h1 { color: #fff; text-shadow: 0 0 10px #fff; margin-bottom: 30px; text-align: center; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>NEURO PSYTRANCE<br><span style="font-size:16px; color:#0ff;">Holographic Engine</span></h1>
        
        <div class="controls">
            <label style="font-size: 18px; font-weight: bold;">ADC GAIN:</label>
            <select id="gain-select">
                <option value="5">32 (Max)</option>
                <option value="4">16 (High)</option>
                <option value="3" selected>8 (Normal)</option>
                <option value="2">4 (Low)</option>
            </select>
        </div>

        <button id="btn-full">1. FULLSCREEN</button>
        <button id="btn-connect">2. CONNECT & PLAY</button>
    </div>

    <canvas id="radar"></canvas>

<script>
// === CONFIG ===
const BLE_SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const BLE_CHAR_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const CMD_UUID         = "c0de0001-36e1-4688-b7f5-ea07361b26a8";

const FS = 250;
const CHANNELS = 8;
const FFT_SIZE = 256; 
let UV_SCALE = (1.2 / 8 / 8388607.0) * 1e6; // Default Gain 8

// SPATIAL MATRIX (Безопасно записанная, без комментов в конце)
const SPATIAL_MATRIX = [[-0.01353, -0.00378, -0.00378, -0.01353, -0.02619, -0.03623, -0.03623, -0.02619],[-0.02752, -0.01700,  0.01700,  0.02752,  0.02752,  0.01700, -0.01700, -0.02752]
];

// === STATE ===
let isConnected = false;
let channelBuffers = Array.from({ length: CHANNELS }, () => new Float32Array(FFT_SIZE).fill(0));
let packetBuffer = new Uint8Array(); 
let audioCtx = null;
let audioWorkletNode = null;
let isRunning = false;

// Нейро-параметры для передачи в синтезатор
let neuroParams = {
    deltaAmp: 0, deltaFreq: 2.0,
    thetaAmp: 0, thetaFreq: 6.0,
    alphaXAmp: 0, alphaYAmp: 0,
    gammaAmp: 0, leadX: 0, leadY: 0
};

// === IIR FILTERS (Для быстрого расчета аудио-параметров) ===
class Biquad {
    constructor(b0, b1, b2, a1, a2) {
        this.b =[b0, b1, b2]; this.a = [1, a1, a2];
        this.z1 = 0; this.z2 = 0;
    }
    process(x) {
        let out = this.b[0]*x + this.z1;
        this.z1 = this.b[1]*x - this.a[1]*out + this.z2;
        this.z2 = this.b[2]*x - this.a[2]*out;
        return out;
    }
}
const filters = {
    delta: new Biquad(0.007, 0, -0.007, -1.98, 0.985),
    theta: new Biquad(0.017, 0, -0.017, -1.96, 0.965),
    alphaX: new Biquad(0.025, 0, -0.025, -1.90, 0.95),
    alphaY: new Biquad(0.025, 0, -0.025, -1.90, 0.95),
    gamma: new Biquad(0.100, 0, -0.100, -1.17, 0.80)
};

// === AUDIO SYNTHESIS (ОБХОД БЛОКИРОВКИ FILE:// ЧЕРЕЗ BASE64) ===
async function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const workletCode = `
        class PsytranceProcessor extends AudioWorkletProcessor {
            constructor() {
                super();
                this.p = { d: 0, t: 0, fm_c: 0, fm_m: 0 };
                this.timers = { kick: 10, bass: 10 };
                this.delayBuf =[new Float32Array(88200), new Float32Array(88200)]; 
                this.delayPtr = 0;
                this.np = { deltaAmp:0, deltaFreq:2, thetaAmp:0, thetaFreq:6, alphaXAmp:0, alphaYAmp:0, gammaAmp:0, leadX:0, leadY:0 };
                this.port.onmessage = (e) => { this.np = e.data; };
            }
            process(inputs, outputs) {
                if(!outputs[0] || !outputs[0][0]) return true;
                const outL = outputs[0][0]; 
                const outR = outputs[0][1] || outL;
                const dt = 1.0 / sampleRate;
                const np = this.np;

                let fd = Math.max(1.0, Math.min(np.deltaFreq, 4.0));
                let ft = Math.max(3.0, Math.min(np.thetaFreq, 12.0));

                for (let i = 0; i < outL.length; i++) {
                    let mixL = 0, mixR = 0;

                    let old_pd = this.p.d;
                    this.p.d = (this.p.d + fd * dt) % 1.0;
                    this.p.t = (this.p.t + ft * dt) % 1.0;

                    // KICK
                    if (this.p.d < old_pd) this.timers.kick = 0;
                    if (this.timers.kick < 0.38) {
                        let T = this.timers.kick;
                        let env = Math.exp(-T * 10.0);
                        let pitch = 40 + 150 * Math.exp(-T * 20.0);
                        let wave = Math.sin(6.2832 * (48*T - 3.5*Math.exp(-55*T)));
                        let amp = Math.max(0.5, Math.min(np.deltaAmp*2.2, 1.6));
                        mixL += wave * env * amp * 1.4;
                        this.timers.kick += dt;
                    }

                    // BASS
                    let b_raw = 2.0 * (this.p.t - 0.5);
                    let b_env = Math.exp(-this.p.t * 8.0);
                    let tAmp = Math.max(0.2, Math.min(np.thetaAmp*1.5, 0.8));
                    mixL += Math.tanh(b_raw * b_env * (2.2 + np.thetaAmp*5)) * tAmp * 1.15;

                    // FM LEAD
                    let c_freq = 150.0 + np.alphaXAmp * 300.0;
                    let m_freq = 50.0 + np.alphaYAmp * 100.0;
                    let m_index = 2.0 + np.alphaYAmp * 5.0;
                    
                    this.p.fm_c = (this.p.fm_c + c_freq * dt) % 1.0;
                    this.p.fm_m = (this.p.fm_m + m_freq * dt) % 1.0;
                    
                    let lead_wave = Math.sin(6.2832 * this.p.fm_c + m_index * Math.sin(6.2832 * this.p.fm_m));
                    let lead_env = Math.exp(-((this.p.t * 2) % 1.0) * 5.0);
                    let lead_vol = Math.max(0.0, Math.min((np.alphaXAmp - 0.06)*6.0, 0.72));
                    mixR += lead_wave * lead_env * lead_vol * 0.58;

                    // HATS
                    let noise = Math.random() * 2 - 1;
                    let hat_env = Math.exp(-((this.p.t * 4) % 1.0) * 20.0);
                    let gAmp = Math.max(0.0, Math.min(np.gammaAmp*2.0, 0.5));
                    let hats = noise * hat_env * gAmp * 0.65;
                    mixL += hats; mixR += hats;

                    // MASTER & DELAY
                    mixL = Math.tanh(mixL * 2.2) * 0.0018;
                    mixR = Math.tanh(mixR * 2.2) * 0.0018;
                    
                    let drive = Math.max(0.0, Math.min(np.gammaAmp * 1.8, 1.0));
                    mixL = Math.tanh(mixL * (1.0 + drive * 2.5));
                    mixR = Math.tanh(mixR * (1.0 + drive * 2.5));

                    let d_mix = Math.max(0.1, Math.min(0.6 - np.gammaAmp + np.alphaXAmp, 0.8));
                    let d_samp = Math.floor(0.28 * sampleRate);
                    let didx = (this.delayPtr - d_samp + this.delayBuf[0].length) % this.delayBuf[0].length;
                    let eL = this.delayBuf[0][didx];
                    let eR = this.delayBuf[1][didx];

                    this.delayBuf[0][this.delayPtr] = mixL + eR * 0.55;
                    this.delayBuf[1][this.delayPtr] = mixR + eL * 0.55;
                    this.delayPtr = (this.delayPtr + 1) % this.delayBuf[0].length;

                    // Громкость х3.0 для хорошей слышимости в браузере
                    outL[i] = Math.tanh(mixL + eL * d_mix) * 3.0; 
                    outR[i] = Math.tanh(mixR + eR * d_mix) * 3.0;
                }
                return true;
            }
        }
        registerProcessor('psy-synth', PsytranceProcessor);
    `;

    // Создаем Base64 URI, чтобы обойти блокировку CORS на file:///
    const base64Code = btoa(unescape(encodeURIComponent(workletCode)));
    const workletURL = 'data:application/javascript;base64,' + base64Code;
    
    await audioCtx.audioWorklet.addModule(workletURL);
    audioWorkletNode = new AudioWorkletNode(audioCtx, 'psy-synth');
    audioWorkletNode.connect(audioCtx.destination);
    
    setInterval(() => {
        if(isRunning && audioWorkletNode) audioWorkletNode.port.postMessage(neuroParams);
    }, 50);
}

// === BLE HANDLER & DEVICE SETUP ===
async function applyStageSettings(cmdChar, pga) {
    const stage = 4;
    const presets = { 4: [7, pga, 0, 0x000F] }; // ИСПОЛЬЗУЕМ ВЫБРАННЫЙ GAIN
    const [sps, gain, mux, dc] = presets[stage];

    async function writeReg(addr, val, mask=null) {
        let cmd = mask ? new Uint8Array([addr, (val>>8)&0xFF, val&0xFF, (mask>>8)&0xFF, mask&0xFF]) : new Uint8Array([addr, (val>>8)&0xFF, val&0xFF]);
        await cmdChar.writeValueWithoutResponse(cmd);
        await new Promise(r => setTimeout(r, 150));
    }

    await writeReg(0x08, dc, 0x000F); // DC Block
    await writeReg(0x03, sps << 2, 0x001C); // SPS
    
    let pga_val = (gain<<12)|(gain<<8)|(gain<<4)|gain;
    await writeReg(0x04, pga_val); // PGA1
    await writeReg(0x05, pga_val); // PGA2
    
    for (let i = 0; i < 8; i++) await writeReg(0x09 + i*5, mux, 0x0003); // MUX

    const gain_real =[1, 1, 4, 8, 16, 32][gain];
    UV_SCALE = (1.2 / gain_real / 8388607.0) * 1e6;
    console.log("Device configured. Gain:", gain_real);
}

async function connectBLE() {
    try {
        await initAudio(); // Обязательно в обработчике клика
        
        const btn = document.getElementById('btn-connect');
        btn.innerText = "SCANNING...";
        
        const device = await navigator.bluetooth.requestDevice({
            filters:[{ services: [BLE_SERVICE_UUID] }]
        });

        btn.innerText = "CONNECTING...";
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(BLE_SERVICE_UUID);
        
        // Отправляем настройки
        const cmdChar = await service.getCharacteristic(CMD_UUID);
        const selectedGain = parseInt(document.getElementById('gain-select').value);
        await applyStageSettings(cmdChar, selectedGain);

        const dataChar = await service.getCharacteristic(BLE_CHAR_UUID);
        await dataChar.startNotifications();
        dataChar.addEventListener('characteristicvaluechanged', onDataReceived);

        document.getElementById('ui-layer').style.opacity = 0;
        document.getElementById('ui-layer').style.pointerEvents = 'none';
        
        isRunning = true;
        requestAnimationFrame(processLoop);

    } catch (error) {
        alert("Connection Error: " + error.message);
        document.getElementById('btn-connect').innerText = "CONNECT BLE";
    }
}

function onDataReceived(event) {
    const value = new Uint8Array(event.target.value.buffer);
    const temp = new Uint8Array(packetBuffer.length + value.length);
    temp.set(packetBuffer); temp.set(value, packetBuffer.length);
    packetBuffer = temp;

    while (packetBuffer.length >= 33) {
        let found = false;
        for (let i = 0; i < packetBuffer.length - 32; i++) {
            if (packetBuffer[i] === 0xA0 && packetBuffer[i+32] === 0xC0) {
                parsePacket(packetBuffer.slice(i, i+33));
                packetBuffer = packetBuffer.slice(i + 33);
                found = true; break; 
            }
        }
        if (!found) {
            if (packetBuffer.length > 100) packetBuffer = packetBuffer.slice(-32);
            break;
        }
    }
}

function parsePacket(pkt) {
    let mean = 0, raw = new Float32Array(8);
    for (let i = 0; i < CHANNELS; i++) {
        let val = (pkt[2 + i*3] << 16) | (pkt[3 + i*3] << 8) | pkt[4 + i*3];
        if ((val & 0x800000) > 0) val = val - 0x1000000;
        raw[i] = val * UV_SCALE;
        mean += raw[i];
        
        // Для FFT Визуализации
        channelBuffers[i].set(channelBuffers[i].subarray(1));
        channelBuffers[i][FFT_SIZE-1] = raw[i];
    }
    mean /= 8.0;

    // Для Синтезатора (IIR фильтры)
    let globalSig = 0, vecX = 0, vecY = 0;
    for(let i=0; i<8; i++) {
        let centered = raw[i] - mean;
        globalSig += centered;
        vecX += centered * SPATIAL_MATRIX[0][i];
        vecY += centered * SPATIAL_MATRIX[1][i];
    }
    globalSig /= 8.0;

    let valD = filters.delta.process(globalSig);
    let valT = filters.theta.process(globalSig);
    let valAx = filters.alphaX.process(vecX);
    let valAy = filters.alphaY.process(vecY);
    let valG = filters.gamma.process(globalSig);

    neuroParams.deltaAmp = neuroParams.deltaAmp * 0.98 + Math.abs(valD) * 0.02 * 2.0;
    neuroParams.thetaAmp = neuroParams.thetaAmp * 0.98 + Math.abs(valT) * 0.02 * 2.0;
    neuroParams.alphaXAmp= neuroParams.alphaXAmp* 0.98 + Math.abs(valAx)* 0.02;
    neuroParams.alphaYAmp= neuroParams.alphaYAmp* 0.98 + Math.abs(valAy)* 0.02;
    neuroParams.gammaAmp = neuroParams.gammaAmp * 0.95 + Math.abs(valG) * 0.05 * 5.0;
}

// === CANVAS & VISUALIZATION (Твоя любимая матрица из Holographic_Phase_Map) ===
const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');
let w, h, cx, cy, rad;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    w = canvas.width; h = canvas.height;
    cx = w / 2; cy = h / 2;
    rad = Math.min(cx, cy) * 0.9; 
}
window.addEventListener('resize', resize);
resize();

function computeFFT(inData) {
    const N = inData.length;
    const mags = new Float32Array(N/2);
    const phases = new Float32Array(N/2);
    const win = new Float32Array(N);
    for(let i=0;i<N;i++) win[i] = 0.5*(1-Math.cos(2*Math.PI*i/(N-1)));

    for (let k=0; k<N/2; k++) {
        let re=0, im=0;
        for (let n=0; n<N; n++) {
            const phi = (2*Math.PI*k*n)/N;
            re += inData[n]*win[n]*Math.cos(phi);
            im -= inData[n]*win[n]*Math.sin(phi);
        }
        mags[k] = Math.sqrt(re*re + im*im);
        phases[k] = Math.atan2(im, re);
    }
    return { mags, phases };
}

function processLoop() {
    if (!isConnected) { requestAnimationFrame(processLoop); return; }

    const signal = new Float32Array(FFT_SIZE);
    for (let i = 0; i < FFT_SIZE; i++) {
        let sum = 0;
        for(let ch=0; ch<CHANNELS; ch++) sum += channelBuffers[ch][i];
        signal[i] = sum / CHANNELS;
    }

    const { mags, phases } = computeFFT(signal);

    // Отрисовка фона и сетки (Хвосты частиц)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
    ctx.fillRect(0, 0, w, h);
    
    ctx.strokeStyle = '#003300';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, rad*0.25, 0, Math.PI*2);
    ctx.arc(cx, cy, rad*0.5, 0, Math.PI*2);
    ctx.arc(cx, cy, rad*1.0, 0, Math.PI*2);
    ctx.stroke();

    // Отрисовка частиц (Идеальная физика из твоего оригинала)
    for (let i = 2; i < mags.length; i++) {
        const f = i * (FS / FFT_SIZE);
        if (f > 60) break;

        const amp = mags[i];
        const angle = phases[i];
        const dist = (f / 60.0) * rad;
        const x = cx + Math.cos(angle) * dist;
        const y = cy + Math.sin(angle) * dist;

        const size = 3 + Math.min(15, amp); 
        const opacity = 0.4 + Math.min(0.6, amp / 5.0);
        const hue = 240 - (f * 4); 
        
        ctx.fillStyle = `hsla(${hue}, 100%, 50%, ${opacity})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI*2);
        ctx.fill();
    }

    requestAnimationFrame(processLoop);
}

// UI Handlers
document.getElementById('btn-full').onclick = () => {
    document.documentElement.requestFullscreen();
    setTimeout(resize, 500); 
};
document.getElementById('btn-connect').onclick = connectBLE;

</script>
</body>
</html>
