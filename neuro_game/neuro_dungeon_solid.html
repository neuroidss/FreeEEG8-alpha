<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neuro Dungeon: 100% Python Port</title>
    <style>
        body { margin: 0; background: #050505; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #0f0; border-radius: 8px; pointer-events: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
        }
        button {
            background: #000; color: #0f0; border: 2px solid #0f0;
            padding: 20px 40px; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 10px;
        }
        button:hover { background: #0f0; color: #000; }
        .val { color: #fff; font-size: 18px; }
        .stat { font-size: 16px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">FLOOR: <span id="lbl-floor" class="val">1</span></div>
    <div class="stat">X: <span id="lbl-x" class="val">0.00</span> | Y: <span id="lbl-y" class="val">0.00</span></div>
    <div class="stat">Z-FOCUS: <span id="lbl-z" class="val">0.00</span></div>
    <div id="lbl-status" style="color:#ff0; margin-top:10px; font-weight:bold;">SEARCHING...</div>
</div>

<div id="overlay">
    <h1 style="color:#fff; text-shadow: 0 0 15px #0f0; font-size: 40px;">NEURO DUNGEON</h1>
    <p style="color:#888; margin-bottom: 30px; font-size: 18px;">[100% Python Math & Physics Clone]</p>
    <button id="btn-start">CONNECT BLE</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// === 1. ГЕОМЕТРИЯ И КОНСТАНТЫ ===
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const DATA_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const CMD_UUID     = "c0de0001-36e1-4688-b7f5-ea07361b26a8";
const UV_SCALE = (1.2 / 4.0 / 8388607.0) * 1e6;

const ANGLES = [-72, -36, 36, 72, 108, 144, -144, -108].map(a => a * Math.PI / 180);
const PINS_X = ANGLES.map(Math.cos);
const PINS_Y = ANGLES.map(Math.sin);

let ctrl = { x: 0, y: 0, z: 0, interact: false, floor: 1 };
let isConnected = false;

// Буфер 256 (Степень двойки для быстрого FFT)
const BUF_SIZE = 256; 
let eegBuffer = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));

// === 2. БЫСТРЫЙ FFT (Твой код из Emergent_Psytrance) ===
function reverseBits(x, n) {
    let res = 0;
    for (let i = 0; (1 << i) < n; i++) { res = (res << 1) | (x & 1); x >>= 1; }
    return res;
}
function fft(re, im) {
    const n = re.length;
    for (let i = 0; i < n; i++) {
        let j = reverseBits(i, n);
        if (j > i) { let tr=re[i], ti=im[i]; re[i]=re[j]; im[i]=im[j]; re[j]=tr; im[j]=ti; }
    }
    for (let step = 2; step <= n; step <<= 1) {
        let half = step >> 1, theta = -2 * Math.PI / step;
        let wr = Math.cos(theta), wi = Math.sin(theta);
        for (let i = 0; i < n; i += step) {
            let ar = 1, ai = 0;
            for (let j = 0; j < half; j++) {
                let i1 = i + j, i2 = i + j + half;
                let tr = ar * re[i2] - ai * im[i2], ti = ar * im[i2] + ai * re[i2];
                re[i2] = re[i1] - tr; im[i2] = im[i1] - ti; re[i1] += tr; im[i1] += ti;
                let nar = ar * wr - ai * wi, nai = ar * wi + ai * wr;
                ar = nar; ai = nai;
            }
        }
    }
}

// === 3. АУДИО 3D (Копия Python маппинга) ===
class NeuroAudio {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.osc = this.ctx.createOscillator();
        this.gain = this.ctx.createGain();
        this.panner = this.ctx.createStereoPanner();
        
        this.osc.type = 'sine';
        this.gain.gain.value = 0;
        this.osc.connect(this.gain);
        this.gain.connect(this.panner);
        this.panner.connect(this.ctx.destination);
        this.osc.start();
    }
    update() {
        if(this.ctx.state === 'suspended') this.ctx.resume();
        
        let r = Math.sqrt(ctrl.x**2 + ctrl.y**2);
        let vol = Math.max(0, Math.min(0.6, r * 0.35));
        
        // В Python: freq = 250.0 * (2.2 ** ctrl['y'])
        let freq = 250.0 * Math.pow(2.2, ctrl.y);
        this.osc.frequency.setTargetAtTime(Math.max(20, Math.min(2000, freq)), this.ctx.currentTime, 0.04);
        
        // В Python: pan_l = 1-x, pan_r = 1+x. В вебе -1 это лево, 1 это право.
        let pan = Math.max(-1, Math.min(1, ctrl.x));
        this.panner.pan.setTargetAtTime(pan, this.ctx.currentTime, 0.04);
        
        this.gain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.04);
    }
}
let audio;

// === 4. ФИЗИКА И МИР (Сплошные стены) ===
class Maze {
    constructor(dim) {
        this.dim = dim;
        this.grid = Array.from({length: dim}, () => Array(dim).fill(1));
        this.gen(1, 1);
        this.grid[dim-2][dim-2] = 2; // Portal
    }
    gen(x, y) {
        this.grid[y][x] = 0;
        [[0,1],[0,-1],[1,0],[-1,0]].sort(()=>Math.random()-0.5).forEach(([dx, dy]) => {
            let nx=x+dx*2, ny=y+dy*2;
            if(nx>0 && nx<this.dim-1 && ny>0 && ny<this.dim-1 && this.grid[ny][nx]===1) {
                this.grid[y+dy][x+dx] = 0; this.gen(nx, ny);
            }
        });
    }
}

let maze = new Maze(9);
let player = { x: 1.5, y: 1.5, r: 0.4 }; // r=0.4 как в Python
const cellSize = 60;

function gameLoop() {
    if(!isConnected) return;

    // --- 100% ПОРТ PYTHON DSP ---
    
    // CAR: вычитаем среднее по всем каналам для каждого сэмпла
    let centered = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));
    for(let t=0; t<BUF_SIZE; t++) {
        let mean = 0;
        for(let c=0; c<8; c++) mean += eegBuffer[c][t];
        mean /= 8;
        for(let c=0; c<8; c++) centered[c][t] = eegBuffer[c][t] - mean;
    }

    // FFT & Bandpass (8-25 Hz)
    let intensities = new Float32Array(8);
    // При 250Hz и BUF_SIZE=256: шаг частоты ~0.97Hz. 
    // 8Hz = bin 8, 25Hz = bin 26
    for(let c=0; c<8; c++) {
        let re = new Float32Array(centered[c]);
        let im = new Float32Array(BUF_SIZE);
        fft(re, im);
        
        let sum = 0, count = 0;
        for(let bin=8; bin<=26; bin++) {
            sum += Math.sqrt(re[bin]**2 + im[bin]**2);
            count++;
        }
        intensities[c] = sum / count;
    }

    // Центроид и Фокус
    let sumInt = intensities.reduce((a,b)=>a+b, 0);
    let meanInt = sumInt / 8;
    let maxInt = Math.max(...intensities);
    
    let focus = maxInt / (meanInt + 0.001);
    ctrl.z = focus;

    if(focus > 1.15) {
        let cx=0, cy=0;
        for(let i=0; i<8; i++){
            cx += (intensities[i]/sumInt) * PINS_X[i];
            cy += (intensities[i]/sumInt) * PINS_Y[i];
        }
        // Умножитель 15.0 как в Python
        ctrl.x = Math.max(-1, Math.min(1, cx * 15.0));
        ctrl.y = Math.max(-1, Math.min(1, cy * 15.0));
        ctrl.interact = (focus > 1.8);
    } else {
        ctrl.x *= 0.5; ctrl.y *= 0.5; ctrl.interact = false;
    }

    // --- ФИЗИКА (Sliding Axes) ---
    let speed = 0.15;
    let vx = ctrl.x * speed;
    let vy = ctrl.y * speed;

    const hit = (tx, ty) => {
        let gx = Math.floor(tx), gy = Math.floor(ty);
        if(gy<0||gy>=maze.dim||gx<0||gx>=maze.dim) return true;
        return maze.grid[gy][gx] === 1;
    };

    // ИСПРАВЛЕНИЕ ОСИ Y: В Canvas ось Y идет ВНИЗ. 
    // Чтобы ctrl.y > 0 (высокий тон) двигал нас визуально ВВЕРХ, мы ВЫЧИТАЕМ vy.
    if(!hit(player.x + vx + Math.sign(vx)*player.r, player.y)) player.x += vx;
    if(!hit(player.x, player.y - vy - Math.sign(vy)*player.r)) player.y -= vy;

    // ПОРТАЛ
    let p_gx = Math.floor(player.x), p_gy = Math.floor(player.y);
    if(maze.grid[p_gy] && maze.grid[p_gy][p_gx] === 2) {
        document.getElementById('lbl-status').innerText = "🌀 PORTAL OPEN! Z-FOCUS > 1.8!";
        if(ctrl.interact) {
            ctrl.floor++;
            maze = new Maze(9 + ctrl.floor*2);
            player.x = 1.5; player.y = 1.5;
            document.getElementById('lbl-floor').innerText = ctrl.floor;
        }
    } else {
        document.getElementById('lbl-status').innerText = "EXPLORING...";
    }

    // Обновление UI и Аудио
    document.getElementById('lbl-x').innerText = ctrl.x.toFixed(2);
    document.getElementById('lbl-y').innerText = ctrl.y.toFixed(2);
    document.getElementById('lbl-z').innerText = focus.toFixed(2);
    audio.update();
    render();
    requestAnimationFrame(gameLoop);
}

function render() {
    const cvs = document.getElementById('gameCanvas');
    const ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,cvs.width,cvs.height);

    ctx.save();
    // Камера на игроке
    ctx.translate(cvs.width/2 - player.x*cellSize, cvs.height/2 - player.y*cellSize);
    
    for(let r=0; r<maze.dim; r++){
        for(let c=0; c<maze.dim; c++){
            if(maze.grid[r][c] === 1) {
                ctx.fillStyle = '#1a1a20'; ctx.fillRect(c*cellSize, r*cellSize, cellSize, cellSize);
                ctx.strokeStyle = '#333'; ctx.strokeRect(c*cellSize, r*cellSize, cellSize, cellSize);
            } else if(maze.grid[r][c] === 2) {
                ctx.fillStyle = '#0f0'; ctx.beginPath();
                ctx.arc(c*cellSize+cellSize/2, r*cellSize+cellSize/2, cellSize/3, 0, Math.PI*2); ctx.fill();
            }
        }
    }
    
    // Игрок
    ctx.fillStyle = '#0ff'; ctx.beginPath();
    ctx.arc(player.x*cellSize, player.y*cellSize, cellSize*player.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Стик-радар в углу
    ctx.strokeStyle = '#444'; ctx.beginPath();
    ctx.arc(80, window.innerHeight-80, 50, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    // Визуально Y инвертируем для радара, чтобы совпадало с физикой
    ctx.arc(80 + ctrl.x*50, window.innerHeight-80 - ctrl.y*50, 5, 0, Math.PI*2); ctx.fill();
}

// === 5. BLE СТАРТ ===
document.getElementById('btn-start').onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const cmdChar = await service.getCharacteristic(CMD_UUID);
        const dataChar = await service.getCharacteristic(DATA_UUID);

        // Настройка АЦП (Gain 4)
        let pga = 2, val = (pga << 12) | (pga << 8) | (pga << 4) | pga;
        await cmdChar.writeValue(new Uint8Array([0x04, (val>>8)&0xFF, val&0xFF]));
        await new Promise(r => setTimeout(r, 100));
        await cmdChar.writeValue(new Uint8Array([0x05, (val>>8)&0xFF, val&0xFF]));

        await dataChar.startNotifications();
        dataChar.addEventListener('characteristicvaluechanged', (e) => {
            let b = new Uint8Array(e.target.value.buffer);
            if(b[0] === 0xA0) {
                for(let i=0; i<8; i++) {
                    let s = 2 + i*3;
                    let v = (b[s]<<16) | (b[s+1]<<8) | b[s+2];
                    if(v & 0x800000) v -= 0x1000000;
                    
                    // Сдвиг кольцевого буфера
                    eegBuffer[i].set(eegBuffer[i].subarray(1));
                    eegBuffer[i][BUF_SIZE-1] = v * UV_SCALE;
                }
            }
        });

        audio = new NeuroAudio();
        document.getElementById('overlay').style.display = 'none';
        isConnected = true;
        gameLoop();
    } catch(e) { alert("ERROR: " + e); }
};
</script>
</body>
</html>
