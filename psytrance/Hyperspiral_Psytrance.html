<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hyperspiral Psytrance</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 10; transition: opacity 0.5s;
            color: #0ff; font-family: 'Courier New', monospace;
        }
        button {
            background: rgba(0, 255, 255, 0.1); color: #0ff; border: 2px solid #0ff;
            padding: 20px 40px; font-size: 18px; font-weight: bold; border-radius: 50px;
            margin: 10px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); backdrop-filter: blur(5px);
        }
        button:active { background: #0ff; color: #000; }
        
        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 5;
            font-size: 16px; font-weight: bold; text-shadow: 0 0 5px #0ff;
            pointer-events: none; font-family: 'Courier New', monospace; color: #0ff;
        }
        #hud h2 { font-size: 24px; margin: 0 0 10px 0; color: #fff; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1 style="color:white; text-shadow: 0 0 15px #fff; text-align: center;">HYPERSPIRAL PSYTRANCE<br><span style="font-size:16px;">Brain-Computer Music Interface</span></h1>
    <button id="btn-full">1. FULLSCREEN</button>
    <button id="btn-conn">2. CONNECT & PLAY</button>
</div>

<div id="hud">
    <h2>NEURO-DAW</h2>
    <div id="bpm">BPM: --</div>
</div>

<canvas id="cvs"></canvas>

<script>
// === CONFIG & MATH ===
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHAR_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

// Gain 32 (из твоей Arduino прошивки)
const UV_SCALE = (1.2 / 32 / 8388607.0) * 1e6;

// БЕЗОПАСНАЯ МАТРИЦА (без комментариев в конце строк!)
const SPATIAL_MATRIX = [[-0.01353, -0.00378, -0.00378, -0.01353, -0.02619, -0.03623, -0.03623, -0.02619],[-0.02752, -0.01700,  0.01700,  0.02752,  0.02752,  0.01700, -0.01700, -0.02752]
];

// === DSP FILTERS ===
class Biquad {
    constructor(b0, b1, b2, a1, a2) { this.b=[b0,b1,b2]; this.a=[1,a1,a2]; this.z1=0; this.z2=0; }
    process(x) { let o=this.b[0]*x+this.z1; this.z1=this.b[1]*x-this.a[1]*o+this.z2; this.z2=this.b[2]*x-this.a[2]*o; return o; }
}

const filters = {
    delta: new Biquad(0.007, 0, -0.007, -1.98, 0.985), // 1-4 Hz
    theta: new Biquad(0.017, 0, -0.017, -1.96, 0.965), // 4-8 Hz
    alphaX: new Biquad(0.025, 0, -0.025, -1.90, 0.95), // 8-13 Hz
    alphaY: new Biquad(0.025, 0, -0.025, -1.90, 0.95), // 8-13 Hz
    gamma: new Biquad(0.100, 0, -0.100, -1.17, 0.80)   // 30-50 Hz
};

class FreqEstimator {
    constructor(minF, maxF, defaultF) {
        this.samples = 0; this.prev = 0; this.freq = defaultF;
        this.minF = minF; this.maxF = maxF;
    }
    process(val) {
        this.samples++;
        if (val > 0 && this.prev <= 0) {
            let f = 250.0 / this.samples;
            if (f >= this.minF && f <= this.maxF) this.freq = this.freq * 0.9 + f * 0.1;
            this.samples = 0;
        }
        this.prev = val; return this.freq;
    }
}
const freqD = new FreqEstimator(1.0, 4.0, 2.0);
const freqT = new FreqEstimator(4.0, 8.0, 6.0);

// === STATE ===
let isRunning = false;
let packetBuffer = new Uint8Array();
let spiralHistory =[];
let audioWorkletNode = null;

let neuroParams = {
    deltaAmp: 0, deltaFreq: 2.0, thetaAmp: 0, thetaFreq: 6.0,
    alphaXAmp: 0, alphaYAmp: 0, gammaAmp: 0, leadX: 0, leadY: 0
};
let visualState = { delta:0, theta:0, alphaX:0, alphaY:0, gamma:0 };
let kickPhase = 0;

// === BLE ===
async function connectBLE() {
    try {
        await initAudio(); // Запуск звука
        document.getElementById('btn-conn').innerText = "SCANNING...";
        
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services:[SERVICE_UUID] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        
        // Мы больше НЕ отправляем команды настройки Gain!
        // Прошивка .ino уже настроила ADC идеально.
        
        const dataChar = await service.getCharacteristic(CHAR_UUID);
        await dataChar.startNotifications();
        dataChar.addEventListener('characteristicvaluechanged', onData);
        
        document.getElementById('ui-layer').style.opacity = 0;
        setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 500);
        isRunning = true;
        animateCanvas();
    } catch(e) {
        alert("BLE Error: " + e.message);
        document.getElementById('btn-conn').innerText = "2. CONNECT & PLAY";
    }
}

function onData(e) {
    const val = new Uint8Array(e.target.value.buffer);
    let tmp = new Uint8Array(packetBuffer.length + val.length);
    tmp.set(packetBuffer); tmp.set(val, packetBuffer.length);
    packetBuffer = tmp;
    
    while(packetBuffer.length >= 33) {
        let head = packetBuffer.findIndex((v, i) => v === 0xA0 && packetBuffer[i+32] === 0xC0);
        if(head === -1) { if(packetBuffer.length > 66) packetBuffer = packetBuffer.slice(-33); break; }
        if(head > 0) { packetBuffer = packetBuffer.slice(head); continue; }
        
        processEEGSample(packetBuffer.slice(0, 33));
        packetBuffer = packetBuffer.slice(33);
    }
}

function processEEGSample(pkt) {
    let raw = new Float32Array(8), mean = 0;
    for(let i=0; i<8; i++) {
        let v = (pkt[2+i*3]<<16) | (pkt[3+i*3]<<8) | pkt[4+i*3];
        if(v & 0x800000) v -= 0x1000000;
        raw[i] = v * UV_SCALE;
        mean += raw[i];
    }
    mean /= 8.0;

    let globalSig = 0, vecX = 0, vecY = 0;
    for(let i=0; i<8; i++) {
        let centered = raw[i] - mean;
        globalSig += centered;
        vecX += centered * SPATIAL_MATRIX[0][i];
        vecY += centered * SPATIAL_MATRIX[1][i];
    }
    globalSig /= 8.0;

    let valD = filters.delta.process(globalSig);
    let valT = filters.theta.process(globalSig);
    let valAx = filters.alphaX.process(vecX);
    let valAy = filters.alphaY.process(vecY);
    let valG = filters.gamma.process(globalSig);

    // Audio Params
    neuroParams.deltaAmp = neuroParams.deltaAmp * 0.95 + Math.abs(valD) * 0.05 * 5.0;
    neuroParams.thetaAmp = neuroParams.thetaAmp * 0.95 + Math.abs(valT) * 0.05 * 3.0;
    neuroParams.alphaXAmp = neuroParams.alphaXAmp * 0.95 + Math.abs(valAx) * 0.05;
    neuroParams.alphaYAmp = neuroParams.alphaYAmp * 0.95 + Math.abs(valAy) * 0.05;
    neuroParams.gammaAmp = neuroParams.gammaAmp * 0.95 + Math.abs(valG) * 0.05 * 2.0;
    
    neuroParams.deltaFreq = freqD.process(valD);
    neuroParams.thetaFreq = freqT.process(valT);
    neuroParams.leadX = valAx;
    neuroParams.leadY = valAy;

    // Visual State
    visualState.delta = valD;
    visualState.theta = valT;
    visualState.alphaX = valAx;
    visualState.alphaY = valAy;
    visualState.gamma = valG;

    spiralHistory.push({x: valAx, y: valAy, a: Math.hypot(valAx, valAy)});
    if(spiralHistory.length > 200) spiralHistory.shift();
    
    if (valD > 0 && freqD.prev <= 0) kickPhase = 1.0;
    kickPhase *= 0.9;
    
    if(Math.random() < 0.02) {
        document.getElementById('bpm').innerText = `BPM: ${(neuroParams.deltaFreq * 60).toFixed(0)}`;
    }
}

// === AUDIO WORKLET (Psytrance Engine) ===
async function initAudio() {
    const audioCtx = new AudioContext({ sampleRate: 44100 });
    
    const workletCode = `
        const clip = (val, min, max) => Math.max(min, Math.min(val, max));

        class PsytranceProcessor extends AudioWorkletProcessor {
            constructor() {
                super();
                this.p = { d: 0, t: 0, fm_c: 0, fm_m: 0 };
                this.timers = { kick: 10, bass: 10 };
                this.delayBuf =[new Float32Array(88200), new Float32Array(88200)]; // 2s
                this.delayPtr = 0;
                this.np = { deltaAmp:0, deltaFreq:2, thetaAmp:0, thetaFreq:6, alphaXAmp:0, alphaYAmp:0, gammaAmp:0, leadX:0, leadY:0 };
                
                this.port.onmessage = (e) => { this.np = e.data; };
            }

            process(inputs, outputs) {
                if(!outputs[0] || !outputs[0][0]) return true;
                const outL = outputs[0][0]; const outR = outputs[0][1] || outL;
                const dt = 1.0 / sampleRate;
                const np = this.np;

                let fd = clip(np.deltaFreq, 1.0, 4.0);
                let ft = clip(np.thetaFreq, 3.0, 12.0);

                for (let i = 0; i < outL.length; i++) {
                    let mixL = 0, mixR = 0;

                    let old_pd = this.p.d;
                    this.p.d = (this.p.d + fd * dt) % 1.0;
                    this.p.t = (this.p.t + ft * dt) % 1.0;

                    // 1. KICK (Delta)
                    if (this.p.d < old_pd) this.timers.kick = 0;
                    if (this.timers.kick < 0.38) {
                        let T = this.timers.kick;
                        let env = Math.exp(-(this.p.d) * 10.0);
                        let pitch = 40 + 150 * Math.exp(-(this.p.d) * 20.0);
                        mixL += Math.sin(6.2832 * pitch * this.p.d) * env * clip(np.deltaAmp*2.0, 0.5, 1.0) * 1.4;
                        this.timers.kick += dt;
                    }

                    // 2. BASS (Theta)
                    let b_raw = 2.0 * (this.p.t - 0.5);
                    let b_env = Math.exp(-this.p.t * 8.0);
                    mixL += Math.tanh(b_raw * b_env * (2.2 + np.thetaAmp*5)) * clip(np.thetaAmp*1.5, 0.2, 0.8) * 1.15;

                    // 3. FM LEAD (Alpha)
                    let c_freq = 150.0 + np.alphaXAmp * 300.0;
                    let m_freq = 50.0 + np.alphaYAmp * 100.0;
                    let m_index = 2.0 + np.alphaYAmp * 5.0;
                    
                    this.p.fm_c = (this.p.fm_c + c_freq * dt) % 1.0;
                    this.p.fm_m = (this.p.fm_m + m_freq * dt) % 1.0;
                    
                    let lead_wave = Math.sin(6.2832 * this.p.fm_c + m_index * Math.sin(6.2832 * this.p.fm_m));
                    let lead_env = Math.exp(-((this.p.t * 2) % 1.0) * 5.0);
                    let lead_vol = clip((np.alphaXAmp - 0.06)*6, 0, 0.72);
                    let lead = lead_wave * lead_env * lead_vol * 0.8;
                    mixR += lead * 0.58;

                    // 4. HATS (Gamma)
                    let noise = Math.random() * 2 - 1;
                    let hat_env = Math.exp(-((this.p.t * 4) % 1.0) * 20.0);
                    let hats = noise * hat_env * clip(np.gammaAmp*2.0, 0, 0.5) * 0.65;
                    mixL += hats; mixR += hats;

                    // 5. MASTER & DELAY
                    mixL = Math.tanh(mixL * 2.2) * 0.0018;
                    mixR = Math.tanh(mixR * 2.2) * 0.0018;
                    
                    let drive = clip(np.gammaAmp * 1.8, 0, 1.0);
                    mixL = Math.tanh(mixL * (1.0 + drive * 2.5));
                    mixR = Math.tanh(mixR * (1.0 + drive * 2.5));

                    let d_mix = clip(0.6 - np.gammaAmp + np.alphaXAmp, 0.1, 0.8);
                    let d_samp = Math.floor(0.3 * sampleRate);
                    let didx = (this.delayPtr - d_samp + this.delayBuf[0].length) % this.delayBuf[0].length;
                    let eL = this.delayBuf[0][didx];
                    let eR = this.delayBuf[1][didx];

                    this.delayBuf[0][this.delayPtr] = mixL + eR * 0.5;
                    this.delayBuf[1][this.delayPtr] = mixR + eL * 0.5;
                    this.delayPtr = (this.delayPtr + 1) % this.delayBuf[0].length;

                    outL[i] = Math.tanh(mixL + eL * d_mix);
                    outR[i] = Math.tanh(mixR + eR * d_mix);
                }
                return true;
            }
        }
        registerProcessor('psy-synth', PsytranceProcessor);
    `;
    const blob = new Blob([workletCode], { type: 'application/javascript' });
    const workletURL = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(workletURL);
    
    audioWorkletNode = new AudioWorkletNode(audioCtx, 'psy-synth');
    audioWorkletNode.connect(audioCtx.destination);
    
    setInterval(() => { if(isRunning) audioWorkletNode.port.postMessage(neuroParams); }, 50);
}

// === CANVAS VISUALIZATION (MANDALA) ===
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d', {alpha: false});
let cx, cy, vScale;

function resize() {
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    cx = cvs.width / 2; cy = cvs.height / 2;
    vScale = Math.min(cx, cy);
}
window.onresize = resize; resize();

function animateCanvas() {
    if(!isRunning) return;
    
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(0, 0, cvs.width, cvs.height);
    ctx.globalCompositeOperation = 'lighter';
    
    // 1. Орбита Бочки (Дельта)
    if(kickPhase > 0.01) {
        ctx.beginPath();
        ctx.arc(cx, cy, vScale * 0.9, 0, 2 * Math.PI);
        ctx.strokeStyle = `rgba(255, 0, 80, ${kickPhase})`;
        ctx.lineWidth = 15 * kickPhase;
        ctx.shadowColor = 'rgba(255, 0, 80, 1)';
        ctx.shadowBlur = 30;
        ctx.stroke();
    }
    
    // 2. Паутина Баса (Тета)
    const tAmp = Math.min(Math.abs(visualState.theta) * 20.0, 1.0);
    if(tAmp > 0.1) {
        ctx.strokeStyle = `rgba(150, 0, 255, ${tAmp * 0.3})`;
        ctx.lineWidth = 1 + tAmp * 3;
        for (const p of spiralHistory){
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + p.x * 30 * vScale, cy + p.y * 30 * vScale);
            ctx.stroke();
        }
    }
    
    // 3. Главная Спираль (Альфа X/Y)
    if(spiralHistory.length > 2) {
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        for(let i=1; i<spiralHistory.length; i++) {
            const p2 = spiralHistory[i];
            const x1 = cx + spiralHistory[i-1].x * 30 * vScale;
            const y1 = cy + spiralHistory[i-1].y * 30 * vScale;
            const x2 = cx + p2.x * 30 * vScale;
            const y2 = cy + p2.y * 30 * vScale;
            
            const fade = i / spiralHistory.length;
            const hue = 180 - (p2.a * 100);
            
            ctx.beginPath();
            ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${fade * 0.8})`;
            ctx.lineWidth = 2 + (p2.a * 20);
            ctx.stroke();
        }
    }

    // 4. Искры (Гамма)
    const gAmp = Math.min(Math.abs(visualState.gamma) * 30.0, 1.0);
    if(gAmp > 0.2){
        ctx.fillStyle = `rgba(255, 255, 255, ${gAmp})`;
        for(let i=0; i < 20; i++){
            ctx.fillRect(Math.random() * cvs.width, Math.random() * cvs.height, 2, 2);
        }
    }
    ctx.shadowBlur = 0;
    
    requestAnimationFrame(animateCanvas);
}

// === UI BINDINGS ===
document.getElementById('btn-full').onclick = () => { if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); };
document.getElementById('btn-conn').onclick = connectBLE;

</script>
</body>
</html>
