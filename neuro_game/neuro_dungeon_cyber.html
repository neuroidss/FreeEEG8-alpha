<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neuro Reactor: Zero-GC Optimized</title>
    <style>
        body { margin: 0; background: #050505; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 15px; border: 2px solid #0f0; border-radius: 8px; width: 220px; transition: opacity 0.3s, transform 0.3s; }
        #ui.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; }
        
        .stat { font-size: 13px; margin-bottom: 5px; display: flex; justify-content: space-between; color: #0f0; }
        #synapse-bar { width: 100%; height: 6px; background: #111; margin: 10px 0; border: 1px solid #333; position: relative; }
        #synapse-fill { height: 100%; background: #0ff; width: 0%; box-shadow: 0 0 10px #0ff; transition: width 0.1s; }
        
        #radar { width: 100px; height: 100px; border: 1px solid #444; border-radius: 50%; margin: 10px auto; position: relative; background: #080808; }
        #pointer { width: 8px; height: 8px; background: #fff; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff; z-index: 10; }
        .node-dot { width: 4px; height: 4px; background: #333; position: absolute; border-radius: 50%; }

        .slider-box { margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        input[type=range] { width: 100%; accent-color: #0f0; cursor: pointer; }
        
        #btn-toggle-ui { position: absolute; bottom: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); color: #0f0; border: 2px solid #0f0; padding: 15px; border-radius: 50%; font-size: 20px; cursor: pointer; box-shadow: 0 0 15px #0f0; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; }
        
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button.start-btn { background: #000; color: #0f0; border: 2px solid #0f0; padding: 20px 40px; font-size: 24px; cursor: pointer; border-radius: 10px; box-shadow: 0 0 15px #0f0; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">FLOOR: <span id="lbl-floor" style="color:#fff">1</span></div>
    <div class="stat">STABILITY:</div>
    <div id="synapse-bar"><div id="synapse-fill"></div></div>
    
    <div id="radar">
        <div id="pointer"></div>
    </div>

    <div class="slider-box">
        <div class="stat" style="font-size: 10px;"><span>REACTIVE LVL</span><span id="lbl-skill">0.05</span></div>
        <input type="range" id="skill-slider" min="0.001" max="1.0" step="0.001" value="0.05">
    </div>
</div>

<div id="btn-toggle-ui">👁️</div>

<div id="overlay">
    <h1 style="color:#0ff; text-shadow: 0 0 20px #0ff;">NEURO REACTOR v7.1 (Fast)</h1>
    <p style="color:#888; max-width: 500px; font-size: 14px;">
        Оптимизация GC: убраны микро-фризы.<br>
        Идеальная плавность управления стиком.<br>
        Нажмите [ 👁️ ] для скрытия радара.
    </p>
    <button class="start-btn" id="btn-start">CONNECT BLE</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// === 1. ГЕОМЕТРИЯ ===
const RADIUS = 10;
const CH_COUNT = 8;
const ANGLES =[-72, -36, 36, 72, 108, 144, -144, -108].map(d => d * Math.PI / 180);
const ELECTRODES = ANGLES.map(a => ({ x: Math.cos(a) * RADIUS, y: Math.sin(a) * RADIUS }));

// Отмечаем электроды на радаре
const radar = document.getElementById('radar');
ELECTRODES.forEach(e => {
    let dot = document.createElement('div');
    dot.className = 'node-dot';
    dot.style.left = (50 + e.x * 4) + '%';
    dot.style.top = (50 + e.y * 4) + '%';
    radar.appendChild(dot);
});

// UI Toggle
let uiVisible = true;
document.getElementById('btn-toggle-ui').onclick = () => {
    uiVisible = !uiVisible;
    document.getElementById('ui').classList.toggle('hidden', !uiVisible);
    document.getElementById('btn-toggle-ui').style.opacity = uiVisible ? '1' : '0.3';
};

// === 2. ZERO-ALLOCATION ПАМЯТЬ ===
const BUF_SIZE = 256;
let eegBuffer = Array.from({length: CH_COUNT}, () => new Float32Array(BUF_SIZE));
// Глобальные массивы для вычислений (чтобы не создавать их 60 раз в секунду)
const centered = Array.from({length: CH_COUNT}, () => new Float32Array(BUF_SIZE));
const reArr = Array.from({length: CH_COUNT}, () => new Float32Array(BUF_SIZE));
const imArr = Array.from({length: CH_COUNT}, () => new Float32Array(BUF_SIZE));
let electrodePressure = new Float32Array(CH_COUNT);

let isConnected = false;
let skillLevel = 0.05;
let synapticPersistence = 0;
let lastTargetX = 0, lastTargetY = 0;

let ctrl = { x: 0, y: 0, torque: 0 };
let player = { x: 1.5, y: 1.5, r: 0.35, angle: 0 };
let maze;

// === 3. МАТЕМАТИКА (FFT) ===
function fft(re, im) {
    const n = re.length;
    for (let i = 0, j = 0; i < n; i++) {
        if (j > i) [re[i], re[j]] = [re[j], re[i]], [im[i], im[j]] = [im[j], im[i]];
        let m = n >> 1;
        while (m >= 1 && j >= m) j -= m, m >>= 1;
        j += m;
    }
    for (let s = 2; s <= n; s <<= 1) {
        let m = s >> 1, t = -2 * Math.PI / s;
        let wr = Math.cos(t), wi = Math.sin(t);
        for (let i = 0; i < n; i += s) {
            let ar = 1, ai = 0;
            for (let j = 0; j < m; j++) {
                let u = i + j, v = u + m;
                let tr = ar * re[v] - ai * im[v], ti = ar * im[v] + ai * re[v];
                re[v] = re[u] - tr; im[v] = im[u] - ti; re[u] += tr; im[u] += ti;
                let nr = ar * wr - ai * wi; ai = ar * wi + ai * wr; ar = nr;
            }
        }
    }
}

function applyNotchFilters(re, im) {
    const n50 = 51; // 50 Hz at 250 Fs
    const n100 = 102; // 100 Hz at 250 Fs
    for(let i=-1; i<=1; i++) {
        re[n50+i] = im[n50+i] = 0;
        re[n100+i] = im[n100+i] = 0;
    }
}

function get_ciPLV(idxA, idxB) {
    let sum_re = 0, sum_im = 0;
    for (let k = 18; k <= 36; k++) {
        let reA = reArr[idxA][k], imA = imArr[idxA][k];
        let reB = reArr[idxB][k], imB = imArr[idxB][k];
        let mA = Math.sqrt(reA*reA + imA*imA) || 1e-6;
        let mB = Math.sqrt(reB*reB + imB*imB) || 1e-6;
        let uAr = reA/mA, uAi = imA/mA, uBr = reB/mB, uBi = -imB/mB;
        sum_re += (uAr*uBr - uAi*uBi); sum_im += (uAr*uBi + uAi*uBr);
    }
    let mRe = sum_re/19, mIm = sum_im/19;
    let denom = Math.sqrt(Math.max(0, 1.0 - mRe*mRe));
    return denom < 0.001 ? 0 : mIm / denom;
}

// === 4. АУДИО ===
class NeuroReactor {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.connect(this.ctx.destination);
        
        this.voices = ELECTRODES.map((pos, i) => {
            let osc = this.ctx.createOscillator();
            let gain = this.ctx.createGain();
            let pan = this.ctx.createStereoPanner();
            
            osc.type = 'triangle';
            osc.frequency.value = 40 + i * 10; 
            gain.gain.value = 0;
            pan.pan.value = pos.x / RADIUS;

            osc.connect(gain).connect(pan).connect(this.masterGain);
            osc.start();
            return { osc, gain, baseFreq: 40 + i * 10 };
        });

        this.lpFilter = this.ctx.createBiquadFilter();
        this.lpFilter.type = 'lowpass';
        this.lpFilter.Q.value = 5;
        this.masterGain.connect(this.lpFilter).connect(this.ctx.destination);
    }

    update(vx, vy, stability) {
        if(this.ctx.state === 'suspended') this.ctx.resume();
        const t = this.ctx.currentTime;
        
        let totalEnergy = 0;
        for(let i=0; i<CH_COUNT; i++) totalEnergy += electrodePressure[i];

        this.voices.forEach((v, i) => {
            let targetGain = (electrodePressure[i] / (totalEnergy + 1e-6)) * (0.2 + stability * 0.8);
            v.gain.gain.setTargetAtTime(targetGain * 0.4, t, 0.1);
            v.osc.frequency.setTargetAtTime(v.baseFreq + (vx + vy) * 15, t, 0.1);
        });

        let cutoff = 100 + (totalEnergy * 500);
        this.lpFilter.frequency.setTargetAtTime(Math.min(2000, cutoff), t, 0.1);
    }
}
let reactor;

// === 5. ЛАБИРИНТ ===
class Maze {
    constructor(dim) {
        this.dim = dim; this.grid = Array.from({length: dim}, () => Array(dim).fill(1));
        this.gen(1, 1); this.grid[dim-2][dim-2] = 2;
    }
    gen(x, y) {
        this.grid[y][x] = 0;
        [[0,1],[0,-1],[1,0],[-1,0]].sort(()=>Math.random()-0.5).forEach(([dx, dy]) => {
            let nx=x+dx*2, ny=y+dy*2;
            if(nx>0 && nx<this.dim-1 && ny>0 && ny<this.dim-1 && this.grid[ny][nx]===1) {
                this.grid[y+dy][x+dx] = 0; this.gen(nx, ny);
            }
        });
    }
}

// === 6. ЦИКЛ ИГРЫ (Рассинхронизация вычислений и отрисовки) ===
let lastEegProcess = 0;
let target_vx = 0, target_vy = 0, target_tq = 0;

function gameLoop(time) {
    if(!isConnected) return;

    // ОБРАБОТКА ЭЭГ (20-30 раз в секунду, экономит ЦПУ и убирает лаги)
    if (time - lastEegProcess > 33) {
        lastEegProcess = time;

        // CAR
        for(let t=0; t<BUF_SIZE; t++) {
            let avg = 0; 
            for(let c=0; c<CH_COUNT; c++) avg += eegBuffer[c][t];
            avg *= 0.125; // /8
            for(let c=0; c<CH_COUNT; c++) centered[c][t] = eegBuffer[c][t] - avg;
        }

        // FFT (Запись в глобальные массивы)
        for(let c=0; c<CH_COUNT; c++) {
            for(let t=0; t<BUF_SIZE; t++) {
                reArr[c][t] = centered[c][t];
                imArr[c][t] = 0;
            }
            fft(reArr[c], imArr[c]);
            applyNotchFilters(reArr[c], imArr[c]);
        }

        // TENSOR ALL-TO-ALL
        target_vx = 0; target_vy = 0; target_tq = 0;
        electrodePressure.fill(0);

        for(let i=0; i<CH_COUNT; i++) {
            for(let j=i+1; j<CH_COUNT; j++) {
                let val = get_ciPLV(i, j);
                let absVal = Math.abs(val);
                let dx = ELECTRODES[j].x - ELECTRODES[i].x;
                let dy = ELECTRODES[j].y - ELECTRODES[i].y;
                
                target_vx += val * dx;
                target_vy += val * dy;
                target_tq += (val * (ELECTRODES[i].x * dy - ELECTRODES[i].y * dx)) / (RADIUS * 10);
                
                electrodePressure[i] += absVal;
                electrodePressure[j] += absVal;
            }
        }

        // STABILITY
        let mag = Math.sqrt(target_vx**2 + target_vy**2);
        let dot = target_vx * lastTargetX + target_vy * lastTargetY;
        let cosTheta = dot / (mag * Math.sqrt(lastTargetX**2 + lastTargetY**2) + 1e-6);
        
        if (mag > 0.05 && cosTheta > 0.8) synapticPersistence = Math.min(1, synapticPersistence + 0.05);
        else synapticPersistence *= 0.95;
        lastTargetX = target_vx; lastTargetY = target_vy;

        // ЗВУК (Обновляем только когда есть новые данные ЭЭГ)
        reactor.update(target_vx, target_vy, synapticPersistence);
    }

    // === ПЛАВНАЯ ФИЗИКА (60/120 FPS) ===
    let smooth = 0.98 - (skillLevel * 0.1);
    let gain = skillLevel * 1.5;

    ctrl.x = ctrl.x * smooth + target_vx * gain * (1 - smooth);
    ctrl.y = ctrl.y * smooth + target_vy * gain * (1 - smooth);
    ctrl.torque = ctrl.torque * smooth + target_tq * gain * 0.5 * (1 - smooth);

    let boost = (1.0 + synapticPersistence * 3.0);
    player.angle += ctrl.torque * boost * 0.5;
    let speed = -ctrl.y * boost * 0.2;
    
    let dx = Math.sin(player.angle) * speed;
    let dy = -Math.cos(player.angle) * speed;

    const hit = (tx, ty) => {
        let gx = Math.floor(tx), gy = Math.floor(ty);
        if(gy<0||gy>=maze.dim||gx<0||gx>=maze.dim) return true;
        return maze.grid[gy][gx] === 1;
    };
    
    if(!hit(player.x + dx + Math.sign(dx)*0.1, player.y)) player.x += dx;
    if(!hit(player.x, player.y + dy + Math.sign(dy)*0.1)) player.y += dy;

    if(maze.grid[Math.floor(player.y)][Math.floor(player.x)] === 2) {
        let fl = parseInt(document.getElementById('lbl-floor').innerText) + 1;
        document.getElementById('lbl-floor').innerText = fl;
        maze = new Maze(9 + fl*2); player.x = player.y = 1.5;
    }

    // UI Updates
    if (uiVisible) {
        document.getElementById('synapse-fill').style.width = (synapticPersistence * 100) + '%';
        
        // Ограничитель стика на радаре (чтобы не улетал за края)
        let rx = Math.max(-50, Math.min(50, ctrl.x * 5));
        let ry = Math.max(-50, Math.min(50, ctrl.y * 5));
        document.getElementById('pointer').style.left = (50 + rx) + '%';
        document.getElementById('pointer').style.top = (50 + ry) + '%';
    }

    render();
    requestAnimationFrame(gameLoop);
}

function render() {
    const cvs = document.getElementById('gameCanvas');
    const ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,cvs.width,cvs.height);
    const cellSize = 80;
    ctx.save();
    ctx.translate(cvs.width/2, cvs.height/2);
    ctx.rotate(-player.angle);
    ctx.translate(-player.x*cellSize, -player.y*cellSize);
    for(let r=0; r<maze.dim; r++){
        for(let c=0; c<maze.dim; c++){
            if(maze.grid[r][c] === 1) {
                ctx.fillStyle = `rgb(10, ${20 + synapticPersistence*80}, 30)`;
                ctx.fillRect(c*cellSize, r*cellSize, cellSize, cellSize);
            } else if(maze.grid[r][c] === 2) {
                ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(c*cellSize+cellSize/2, r*cellSize+cellSize/2, cellSize/3, 0, Math.PI*2); ctx.fill();
            }
        }
    }
    ctx.restore();
    ctx.save();
    ctx.translate(cvs.width/2, cvs.height/2);
    ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(0, 0, cellSize*0.35, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(-7, 5); ctx.lineTo(7, 5); ctx.fill();
    ctx.restore();
}

document.getElementById('skill-slider').oninput = (e) => {
    skillLevel = parseFloat(e.target.value);
    document.getElementById('lbl-skill').innerText = skillLevel.toFixed(3);
};

document.getElementById('btn-start').onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services:["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
        const dataChar = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
        const cmdChar = await service.getCharacteristic("c0de0001-36e1-4688-b7f5-ea07361b26a8");
        let pga = 2, val = (pga << 12) | (pga << 8) | (pga << 4) | pga;
        await cmdChar.writeValue(new Uint8Array([0x04, (val>>8)&0xFF, val&0xFF]));
        await new Promise(r => setTimeout(r, 100));
        await cmdChar.writeValue(new Uint8Array([0x05, (val>>8)&0xFF, val&0xFF]));
        
        await dataChar.startNotifications();
        dataChar.addEventListener('characteristicvaluechanged', (e) => {
            let b = new Uint8Array(e.target.value.buffer);
            if(b[0] === 0xA0) {
                for(let i=0; i<8; i++) {
                    let v = (b[2+i*3]<<16) | (b[3+i*3]<<8) | b[4+i*3];
                    if(v & 0x800000) v -= 0x1000000;
                    eegBuffer[i].set(eegBuffer[i].subarray(1));
                    eegBuffer[i][BUF_SIZE-1] = v * UV_SCALE;
                }
            }
        });
        reactor = new NeuroReactor();
        maze = new Maze(9);
        document.getElementById('overlay').style.display = 'none';
        isConnected = true;
        requestAnimationFrame(gameLoop);
    } catch(e) { alert(e); }
};
</script>
</body>
</html>
