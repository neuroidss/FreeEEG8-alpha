<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neuro-Choreographer V18 PRO + LOCK</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: none;
            height: 100dvh; /* динамическая высота с учётом интерфейса браузера */
            display: flex;
            flex-direction: column;
        }
        
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
        #overlay h1 {
            border: 3px solid var(--neon);
            padding: 30px;
            box-shadow: 0 0 20px var(--neon);
            text-align: center;
            font-size: clamp(1rem, 5vw, 2rem);
        }

        #container {
            display: flex;
            flex-direction: column;
            height: 100%;
            flex: 1;
            min-height: 0; /* важно для правильного сжатия */
        }
        
        #top-ui {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1 1 auto;
            min-height: 0;
        }
        
        .side {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #111;
        }
        .joy-zone {
            width: min(200px, 40vw);
            height: min(200px, 40vw);
            background: #0a0a0a;
            border-radius: 50%;
            border: 2px solid #222;
            position: relative;
        }
        .handle {
            width: min(60px, 15vw);
            height: min(60px, 15vw);
            background: var(--neon);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            margin: calc(min(60px, 15vw) / -2);
            box-shadow: 0 0 20px var(--neon);
            pointer-events: none;
        }

        /* Панель кнопок – адаптивная и прокручиваемая */
        #fx-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #000;
            border-top: 1px solid #222;
            flex: 0 0 auto;
            max-height: 30vh; /* ограничение, чтобы не занимать слишком много */
            overflow-y: auto;  /* прокрутка, если кнопки не влезают */
            scrollbar-width: thin;
            scrollbar-color: var(--neon) #111;
        }
        #fx-panel::-webkit-scrollbar {
            width: 6px;
        }
        #fx-panel::-webkit-scrollbar-track {
            background: #111;
        }
        #fx-panel::-webkit-scrollbar-thumb {
            background: var(--neon);
            border-radius: 3px;
        }

        .fx-btn {
            width: 55px;
            height: 55px;
            border: 2px solid var(--neon);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            transition: 0.1s;
            cursor: pointer;
            background: #0a0a0a;
            flex-shrink: 0;
        }
        .fx-btn.active {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 15px var(--neon);
        }
        
        /* Для очень маленьких экранов уменьшаем кнопки */
        @media (max-width: 400px) {
            .fx-btn {
                width: 45px;
                height: 45px;
                font-size: 10px;
            }
        }
        
        #debug {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            opacity: 0.8;
            pointer-events: none;
            color: var(--neon);
            text-shadow: 0 0 5px var(--neon);
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="overlay"><h1>⚡ NEURAL LINK: INITIALIZE ⚡</h1></div>
<div id="debug">RHYTHM: ADAPTIVE 🔄 | ENGINE: WEB-AUDIO GPU-STYLE</div>

<div id="container">
    <div id="top-ui">
        <div class="side">
            <div class="joy-zone" id="l-zone"><div class="handle" id="l-handle"></div></div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <div class="fx-btn" id="LB">LB</div>
                <div class="fx-btn" id="LT">LT</div>
            </div>
        </div>
        <div class="side">
            <div class="joy-zone" id="r-zone"><div class="handle" id="r-handle"></div></div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <div class="fx-btn" id="RB">RB</div>
                <div class="fx-btn" id="RT">RT</div>
            </div>
        </div>
    </div>

    <!-- FX Panel with LOCK button and all others -->
    <div id="fx-panel">
        <div class="fx-btn" id="BTN_LK">🔒 LOCK</div>
        <div class="fx-btn" id="BTN_SQ">SQ</div>
        <div class="fx-btn" id="BTN_TR">TR</div>
        <div class="fx-btn" id="BTN_CI">CI</div>
        <div class="fx-btn" id="BTN_CR">CR</div>
        <div class="fx-btn" id="BTN_DR">DR</div>
        <div class="fx-btn" id="BTN_NL">NL</div>
        <div class="fx-btn" id="BTN_NR">NR</div>
    </div>
</div>

<script>
/** --- AUDIO WORKLET: DSP ENGINE (unchanged) --- **/
const workletCode = `
class PsyEngine extends AudioWorkletProcessor {
    constructor() {
        super();
        this.fs = 44100;
        this.numStrings = 6;
        this.octaves = 4;
        this.ratios = [1.0, 1.334, 1.781, 2.378, 2.848, 3.75];
        this.phases = Array.from({length: 6}, () => new Float32Array(4));
        this.subPhase = 0; this.zapPhase = 0; this.kickPhase = 0;
        this.amps = new Float32Array(6);
        
        // Delay Line
        this.delayBuf = new Float32Array(44100 * 3);
        this.ptr = 0;

        // State
        this.rootPos = 0; this.minor = 1.0; this.sept = 0; this.sustain = 0.99;
        this.feedback = 0; this.warp = 1.0; this.delaySamples = 22050;
        this.heat = 1.2; this.subActive = 0; this.zapActive = 0; 
        this.drumsActive = 0; this.glitch = 0; this.noiseL = 0; this.noiseR = 0;

        this.port.onmessage = (e) => {
            if(e.data.pluck !== undefined) this.amps[e.data.pluck] = 2.0;
            else Object.assign(this, e.data);
        };
    }

    process(inputs, outputs) {
        const output = outputs[0][0];
        const baseF = 41.2 * Math.pow(2, this.rootPos);
        
        for (let i = 0; i < output.length; i++) {
            let wave = 0;
            const t = i / this.fs;

            // 1. Shepard Guitar (Sawtooth)
            for (let s = 0; s < 6; s++) {
                let fStr = baseF * this.ratios[s];
                if (s === 3) fStr *= this.minor;
                if (s === 5) fStr *= (1 * (1 - this.sept) + 0.89 * this.sept);

                for (let o = 0; o < this.octaves; o++) {
                    const freq = fStr * Math.pow(2, o + this.rootPos);
                    const weight = Math.pow(Math.sin(Math.PI * (o + this.rootPos) / this.octaves), 2);
                    this.phases[s][o] = (this.phases[s][o] + (2 * Math.PI * freq) / this.fs) % (2 * Math.PI);
                    let saw = (this.phases[s][o] / Math.PI) - 1.0;
                    wave += saw * weight * this.amps[s];
                }
                this.amps[s] *= this.sustain;
            }

            // 2. Shepard Sub-Bass
            if (this.subActive) {
                for (let o = 0; o < 2; o++) {
                    const sf = (baseF * 0.5) * Math.pow(2, o + this.rootPos);
                    this.subPhase = (this.subPhase + (2 * Math.PI * sf) / this.fs) % (2 * Math.PI);
                    wave += Math.sin(this.subPhase) * 0.8;
                }
            }

            // 3. Psy-Drums (Adaptive)
            if (this.drumsActive) {
                let beatIdx = (this.ptr % this.delaySamples) / this.delaySamples;
                let kEnv = Math.exp(-beatIdx * 15);
                let kFreq = kEnv * 150 + 40;
                this.kickPhase += (2 * Math.PI * kFreq) / this.fs;
                wave += Math.sin(this.kickPhase) * kEnv * 1.5;
                if (Math.random() < 0.05 * Math.exp(-((this.ptr % (this.delaySamples/4))/(this.delaySamples/4))*20)) wave += (Math.random()-0.5)*0.5;
            }

            // 4. Noise
            if (this.noiseL) wave += (Math.random()-0.5) * 0.1;
            if (this.noiseR) wave += (Math.random()-0.5) * 0.4 * Math.random();

            // FX
            wave = Math.tanh(wave * this.heat);

            // 5. Adaptive Delay
            let dTime = Math.floor(this.delaySamples * this.warp);
            let readPtr = (this.ptr - dTime + this.delayBuf.length) % this.delayBuf.length;
            let echo = this.delayBuf[readPtr];
            this.delayBuf[this.ptr] = wave + echo * this.feedback;
            
            let final = wave + echo * 0.4;
            if (this.glitch) final = this.delayBuf[(this.ptr - 512 + this.delayBuf.length) % this.delayBuf.length];

            output[i] = final * 0.3;
            this.ptr = (this.ptr + 1) % this.delayBuf.length;
        }
        return true;
    }
}
registerProcessor('psy-engine', PsyEngine);
`;

/** --- UI & CONTROL LOGIC (with Rhythm Lock and mobile improvements) --- **/
let audioCtx, psyNode;
let lastStrum = performance.now();
let intervals = [500, 500];
let rhythmLocked = false;

async function init() {
    if (audioCtx) return;
    audioCtx = new AudioContext();
    const blob = new Blob([workletCode], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(url);
    psyNode = new AudioWorkletNode(audioCtx, 'psy-engine');
    psyNode.connect(audioCtx.destination);
    document.getElementById('overlay').style.display = 'none';
}

document.getElementById('overlay').onclick = init;

function setupJoy(id, handleId, isLeft) {
    const zone = document.getElementById(id), handle = document.getElementById(handleId);
    let active = false;
    let fired = new Array(6).fill(false);   // FIXED

    const move = (e) => {
        if (!active) return;
        const rect = zone.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        const x = (t.clientX - rect.left - rect.width/2) / (rect.width/2);
        const y = (t.clientY - rect.top - rect.height/2) / (rect.height/2);
        const nx = Math.max(-1, Math.min(1, x)), ny = Math.max(-1, Math.min(1, y));
        handle.style.transform = `translate(${nx*60}px, ${ny*60}px)`;

        if (isLeft) {
            const angle = (Math.atan2(nx, -ny) + Math.PI) / (2 * Math.PI);
            psyNode?.port.postMessage({ rootPos: angle });
        } else {
            psyNode?.port.postMessage({ warp: 0.9 + ((nx + 1)/2)*0.2 });
            const ry = -ny;
            if (Math.abs(ry) < 0.1) fired.fill(false);
            const th = [0.15, 0.3, 0.45, 0.6, 0.75, 0.9];
            
            const trigger = (idx) => {
                psyNode?.port.postMessage({ pluck: idx });
                fired[idx] = true;
                
                if (!rhythmLocked) {
                    let now = performance.now();
                    if (now - lastStrum > 80 && now - lastStrum < 2000) {
                        intervals.push(now - lastStrum);
                        if (intervals.length > 4) intervals.shift();
                        let avg = intervals.reduce((a,b)=>a+b,0) / intervals.length;
                        psyNode?.port.postMessage({ delaySamples: Math.floor((avg/1000)*44100) });
                    }
                    lastStrum = now;
                }
            };
            
            if (ry > 0.1) {
                th.forEach((t, i) => {
                    if (ry > t && !fired[i]) trigger(i);
                });
            } else if (ry < -0.1) {
                th.forEach((t, i) => {
                    if (Math.abs(ry) > t && !fired[5-i]) trigger(5-i);
                });
            }
        }
    };

    zone.onmousedown = zone.ontouchstart = (e) => { e.preventDefault(); active = true; move(e); };
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, { passive: false });
    window.addEventListener('mouseup', () => { active = false; handle.style.transform = ''; });
    window.addEventListener('touchend', () => { active = false; handle.style.transform = ''; });
}

setupJoy('l-zone', 'l-handle', true);
setupJoy('r-zone', 'r-handle', false);

// Standard button binding
function bind(id, param, valOn, valOff, isToggle = false) {
    const el = document.getElementById(id);
    let state = false;
    const set = (v) => {
        if(isToggle) { if(!v) return; state = !state; } else { state = v; }
        el.classList.toggle('active', state);
        let d = {}; d[param] = state ? valOn : valOff;
        psyNode?.port.postMessage(d);
    };
    el.ontouchstart = el.onmousedown = (e) => { e.preventDefault(); set(true); };
    if(!isToggle) { 
        el.ontouchend = el.onmouseup = el.onmouseleave = () => set(false); 
    }
}

// Lock button (toggles rhythmLocked and updates debug text)
function bindLock(id) {
    const el = document.getElementById(id);
    el.ontouchstart = el.onmousedown = (e) => {
        e.preventDefault();
        rhythmLocked = !rhythmLocked;
        el.classList.toggle('active', rhythmLocked);
        document.getElementById('debug').innerHTML = 
            `RHYTHM: ${rhythmLocked ? 'LOCKED 🔒' : 'ADAPTIVE 🔄'} | ENGINE: WEB-AUDIO GPU-STYLE`;
    };
}

// Map all buttons
bind('LB', 'minor', 0.89, 1.0);
bind('LT', 'sept', 0.8, 0.0);
bind('RB', 'heat', 4.0, 1.2);
bind('RT', 'feedback', 0.8, 0.0);
bind('BTN_SQ', 'glitch', 1, 0);
bind('BTN_TR', 'zapActive', 1, 0);
bind('BTN_CI', 'heat', 15.0, 1.2);     // "acid" effect uses heat
bind('BTN_CR', 'subActive', 1, 0);
bind('BTN_DR', 'drumsActive', 1, 0, true);
bind('BTN_NL', 'noiseL', 1, 0);
bind('BTN_NR', 'noiseR', 1, 0);
bindLock('BTN_LK');

</script>
</body>
</html>
