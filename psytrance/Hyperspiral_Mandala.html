<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hyperspiral Mandala</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 10; transition: opacity 0.5s;
            color: #0ff; font-family: 'Courier New', monospace;
        }
        button {
            background: rgba(0, 255, 255, 0.1); color: #0ff; border: 2px solid #0ff;
            padding: 20px 40px; font-size: 18px; font-weight: bold; border-radius: 50px;
            margin: 10px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); backdrop-filter: blur(5px);
        }
        button:active { background: #0ff; color: #000; }
    </style>
</head>
<body>
<div id="ui-layer">
    <h1 style="color:white; text-shadow: 0 0 15px #fff; text-align: center;">HYPERSPIRAL<br><span style="font-size:16px;">Real-Time Neuro-Mandala</span></h1>
    <button id="btn-full">1. FULLSCREEN</button>
    <button id="btn-conn">2. CONNECT</button>
</div>
<canvas id="cvs"></canvas>

<script>
// === CONFIG & MATH ===
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHAR_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const UV_SCALE = (1.2 / 128 / 8388607.0) * 1e6;

const SPATIAL_MATRIX = [
    [-0.01353, -0.00378, -0.00378, -0.01353, -0.02619, -0.03623, -0.03623, -0.02619], // X
    [-0.02752, -0.01700,  0.01700,  0.02752,  0.02752,  0.01700, -0.01700, -0.02752]  // Y
];

class Biquad {
    constructor(b0, b1, b2, a1, a2) { this.b=[b0,b1,b2]; this.a=[1,a1,a2]; this.z1=0; this.z2=0; }
    process(x) { let o=this.b[0]*x+this.z1; this.z1=this.b[1]*x-this.a[1]*o+this.z2; this.z2=this.b[2]*x-this.a[2]*o; return o; }
}

const filters = {
    delta: new Biquad(0.007, 0, -0.007, -1.98, 0.985),
    theta: new Biquad(0.017, 0, -0.017, -1.96, 0.965),
    alphaX: new Biquad(0.025, 0, -0.025, -1.90, 0.95),
    alphaY: new Biquad(0.025, 0, -0.025, -1.90, 0.95),
    gamma: new Biquad(0.100, 0, -0.100, -1.17, 0.80)
};

// === STATE ===
let isRunning = false;
let packetBuffer = new Uint8Array();
let spiralHistory = [];
let neuroState = { delta:0, theta:0, alphaX:0, alphaY:0, gamma:0 };
let kickPhase = 0; // Для визуализации бочки

// === BLE ===
async function connectBLE() {
    try {
        if (typeof(AudioContext) !== 'undefined') { new AudioContext(); } // "Wake up" audio
        document.getElementById('btn-conn').innerText = "SCANNING...";
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services:[SERVICE_UUID] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const char = await service.getCharacteristic(CHAR_UUID);
        await char.startNotifications();
        char.addEventListener('characteristicvaluechanged', onData);
        document.getElementById('ui-layer').style.opacity = 0;
        setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 500);
        isRunning = true;
        animate();
    } catch(e) {
        alert("BLE Error: " + e.message);
        document.getElementById('btn-conn').innerText = "2. CONNECT";
    }
}

// === EEG DSP ===
function processEEGSample(pkt) {
    let raw = new Float32Array(8), mean = 0;
    for(let i=0; i<8; i++) {
        let v = (pkt[2+i*3]<<16) | (pkt[3+i*3]<<8) | pkt[4+i*3];
        if(v & 0x800000) v -= 0x1000000;
        raw[i] = v * UV_SCALE;
        mean += raw[i];
    }
    mean /= 8.0;

    let globalSig = 0, vecX = 0, vecY = 0;
    for(let i=0; i<8; i++) {
        let centered = raw[i] - mean;
        globalSig += centered;
        vecX += centered * SPATIAL_MATRIX[0][i];
        vecY += centered * SPATIAL_MATRIX[1][i];
    }
    globalSig /= 8.0;

    const smooth = 0.98; // Коэффициент сглаживания
    neuroState.delta = neuroState.delta * smooth + filters.delta.process(globalSig) * (1 - smooth);
    neuroState.theta = neuroState.theta * smooth + filters.theta.process(globalSig) * (1 - smooth);
    neuroState.alphaX= neuroState.alphaX* smooth + filters.alphaX.process(vecX) * (1 - smooth);
    neuroState.alphaY= neuroState.alphaY* smooth + filters.alphaY.process(vecY) * (1 - smooth);
    neuroState.gamma = neuroState.gamma * 0.92 + filters.gamma.process(globalSig) * 0.08;

    spiralHistory.push({x: neuroState.alphaX, y: neuroState.alphaY, a: Math.hypot(neuroState.alphaX, neuroState.alphaY)});
    if(spiralHistory.length > 250) spiralHistory.shift();
    
    // Детектор удара бочки (по пересечению нуля Дельты)
    if (neuroState.delta > 0 && filters.delta.z1 <= 0) kickPhase = 1.0;
    kickPhase *= 0.9; // Затухание волны
}

function onData(e) {
    const val = new Uint8Array(e.target.value.buffer);
    let tmp = new Uint8Array(packetBuffer.length + val.length);
    tmp.set(packetBuffer); tmp.set(val, packetBuffer.length);
    packetBuffer = tmp;
    
    while(packetBuffer.length >= 33) {
        let head = packetBuffer.findIndex((v, i) => v === 0xA0 && packetBuffer[i+32] === 0xC0);
        if(head === -1) { if(packetBuffer.length > 66) packetBuffer = packetBuffer.slice(-33); break; }
        if(head > 0) packetBuffer = packetBuffer.slice(head);
        
        processEEGSample(packetBuffer.slice(0, 33));
        packetBuffer = packetBuffer.slice(33);
    }
}

// === CANVAS RENDER LOOP ===
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d', {alpha: false});
let cx, cy, vScale;

function resize() {
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    cx = cvs.width / 2; cy = cvs.height / 2;
    vScale = Math.min(cx, cy);
}
window.onresize = resize;
resize();

function animate() {
    if(!isRunning) return;
    
    // --- 1. Очистка и фон ---
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(0, 0, cvs.width, cvs.height);
    ctx.globalCompositeOperation = 'lighter';
    
    // --- 2. Орбита БОЧКИ (Дельта) ---
    if(kickPhase > 0.01) {
        ctx.beginPath();
        ctx.arc(cx, cy, vScale * 0.95, 0, 2 * Math.PI);
        ctx.strokeStyle = `rgba(255, 0, 80, ${kickPhase})`;
        ctx.lineWidth = 15 * kickPhase;
        ctx.shadowColor = 'rgba(255, 0, 80, 1)';
        ctx.shadowBlur = 30;
        ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // --- 3. Паутина БАСА (Тета) ---
    const thetaAmp = Math.min(Math.abs(neuroState.theta) * 20.0, 1.0);
    if(thetaAmp > 0.1){
        ctx.strokeStyle = `rgba(150, 0, 255, ${thetaAmp * 0.2})`;
        ctx.lineWidth = 1 + thetaAmp * 3;
        for (const p of spiralHistory){
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + p.x * 25 * vScale, cy + p.y * 25 * vScale);
            ctx.stroke();
        }
    }
    
    // --- 4. Главная СПИРАЛЬ (Альфа) ---
    if(spiralHistory.length > 2) {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        for(let i=1; i<spiralHistory.length; i++) {
            const p2 = spiralHistory[i];
            const x1 = cx + spiralHistory[i-1].x * 25 * vScale;
            const y1 = cy + spiralHistory[i-1].y * 25 * vScale;
            const x2 = cx + p2.x * 25 * vScale;
            const y2 = cy + p2.y * 25 * vScale;
            
            const fade = i / spiralHistory.length;
            const hue = 180 - (p2.a * 100);
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${fade * 0.8})`;
            ctx.lineWidth = 2 + (p2.a * 20);
            ctx.stroke();
        }
    }

    // --- 5. ИСКРЫ (Гамма) ---
    const gammaAmp = Math.min(Math.abs(neuroState.gamma) * 30.0, 1.0);
    if(gammaAmp > 0.2){
        ctx.fillStyle = `rgba(255, 255, 255, ${gammaAmp * 0.5})`;
        for(let i=0; i < 20; i++){
            const x = Math.random() * cvs.width;
            const y = Math.random() * cvs.height;
            ctx.fillRect(x, y, 2, 2);
        }
    }

    requestAnimationFrame(animate);
}

// === UI BINDINGS ===
document.getElementById('btn-full').onclick = () => document.documentElement.requestFullscreen();
document.getElementById('btn-conn').onclick = connectBLE;

</script>
</body>
</html>
