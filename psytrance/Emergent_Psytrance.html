<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergent Psytrance</title>
    <style>
        body { 
            margin: 0; background: #080808; overflow: hidden; 
            font-family: 'Courier New', monospace; color: #00ffcc;
            touch-action: none; /* Блокируем скролл для работы зума */
        }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 10; transition: opacity 0.5s;
        }
        
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; z-index: 11; }
        select {
            background: rgba(0, 255, 255, 0.1); color: #0ff; border: 2px solid #0ff;
            padding: 10px 20px; font-size: 18px; font-weight: bold; border-radius: 10px;
            outline: none; cursor: pointer;
        }
        select option { background: #000; color: #0ff; }
        
        button {
            background: rgba(0, 255, 204, 0.1); color: #00ffcc;
            border: 2px solid #00ffcc; padding: 20px 40px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            margin: 10px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); backdrop-filter: blur(5px); transition: 0.3s;
        }
        button:active, button:hover { background: #00ffcc; color: #000; }
        
        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 5;
            font-size: 16px; font-weight: bold; text-shadow: 0 0 5px #00ffcc;
            pointer-events: none; line-height: 1.5;
        }
        #hud-title { font-size: 24px; margin-bottom: 10px; color: #fff; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1 style="color:white; text-shadow: 0 0 15px #fff; text-align: center;">EMERGENT PSYTRANCE<br><span style="font-size:16px; color:#0f0;">PURE NEUROFEEDBACK ENGINE</span></h1>
    
    <div class="controls">
        <label style="font-size: 18px; font-weight: bold;">ADC GAIN:</label>
        <select id="gain-select">
            <option value="5">32 (Max)</option>
            <option value="4">16 (High)</option>
            <option value="3" selected>8 (Normal)</option>
            <option value="2">4 (Low)</option>
            <option value="7">128 (Microscope)</option>
        </select>
    </div>

    <button id="btn-full">1. FULLSCREEN</button>
    <button id="btn-conn">2. CONNECT & PLAY</button>
</div>

<div id="hud">
    <div id="hud-title">SPATIAL RADAR</div>
    <div id="hud-zoom" style="color:#fff;">ZOOM: x1.0</div>
    <div id="hud-bpm">TEMPO: -- BPM</div>
    <div id="hud-bass">BASS: -- Hz</div>
    <div id="hud-style">STYLE: WAITING</div>
</div>

<canvas id="cvs"></canvas>

<script>
// === CONFIG & MATH ===
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHAR_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const CMD_UUID     = "c0de0001-36e1-4688-b7f5-ea07361b26a8";

const EEG_FS = 250;
const BUF_SIZE = 1024; // Окно ~4 сек для идеального FFT

let UV_SCALE = (1.2 / 8 / 8388607.0) * 1e6;

// Матрица проекции для круга электродов
const SPATIAL_MATRIX = [
    [-0.01353, -0.00378, -0.00378, -0.01353, -0.02619, -0.03623, -0.03623, -0.02619],
    [-0.02752, -0.01700,  0.01700,  0.02752,  0.02752,  0.01700, -0.01700, -0.02752]
];

// === FAST FFT (Полный аналог PyTorch) ===
function reverseBits(x, n) {
    let res = 0;
    for (let i = 0; (1 << i) < n; i++) { res = (res << 1) | (x & 1); x >>= 1; }
    return res;
}

function fft(re, im) {
    const n = re.length;
    for (let i = 0; i < n; i++) {
        let j = reverseBits(i, n);
        if (j > i) { let tr = re[i], ti = im[i]; re[i] = re[j]; im[i] = im[j]; re[j] = tr; im[j] = ti; }
    }
    for (let step = 2; step <= n; step <<= 1) {
        let half = step >> 1, theta = -2 * Math.PI / step;
        let wr = Math.cos(theta), wi = Math.sin(theta);
        for (let i = 0; i < n; i += step) {
            let ar = 1, ai = 0;
            for (let j = 0; j < half; j++) {
                let i1 = i + j, i2 = i + j + half;
                let tr = ar * re[i2] - ai * im[i2], ti = ar * im[i2] + ai * re[i2];
                re[i2] = re[i1] - tr; im[i2] = im[i1] - ti; re[i1] += tr; im[i1] += ti;
                let nar = ar * wr - ai * wi, nai = ar * wi + ai * wr;
                ar = nar; ai = nai;
            }
        }
    }
}

function ifft(re, im) {
    const n = re.length;
    for (let i = 0; i < n; i++) im[i] = -im[i];
    fft(re, im);
    for (let i = 0; i < n; i++) { re[i] /= n; im[i] = -im[i] / n; }
}

function extractBandFeatures(signal, low, high, returnWaveform = false) {
    let re = new Float32Array(signal), im = new Float32Array(BUF_SIZE);
    fft(re, im);

    for(let i = 0; i < BUF_SIZE; i++) {
        let freq = i * (EEG_FS / BUF_SIZE);
        if (i > BUF_SIZE/2) freq = (BUF_SIZE - i) * (EEG_FS / BUF_SIZE);
        let mask = (freq >= low && freq <= high && i <= BUF_SIZE/2) ? 1 : 0;
        if (mask) { re[i] *= 2.0; im[i] *= 2.0; } 
        else { re[i] = 0; im[i] = 0; }
    }
    ifft(re, im);

    let meanAmp = 0, meanFreq = 0;
    let lastPhase = 0;
    let windowLen = 125; // 0.5 sec

    for(let i = BUF_SIZE - windowLen; i < BUF_SIZE; i++) {
        let amp = Math.sqrt(re[i]*re[i] + im[i]*im[i]);
        let phase = Math.atan2(im[i], re[i]);
        let p_diff = phase - lastPhase;
        while(p_diff > Math.PI) p_diff -= 2*Math.PI;
        while(p_diff < -Math.PI) p_diff += 2*Math.PI;
        
        meanAmp += amp;
        if(i > BUF_SIZE - windowLen) meanFreq += Math.abs(p_diff * (EEG_FS / (2 * Math.PI)));
        lastPhase = phase;
    }

    let result = { amp: meanAmp / windowLen, freq: meanFreq / (windowLen-1) };
    
    // Для графики радара берем реальную волну (последние 10 семплов)
    if (returnWaveform) {
        let wave = new Float32Array(10);
        for(let i=0; i<10; i++) wave[i] = re[BUF_SIZE - 10 + i];
        result.wave = wave;
    }
    return result;
}

// === STATE ===
let isRunning = false;
let packetBuffer = new Uint8Array();
let eegBuffer = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));
let processCounter = 0;

let audioCtx = null;
let audioWorkletNode = null;

// Переменные визуализации
let viewZoom = 150.0; // Стартовый зум
let render_phase_x = 0;
let render_phase_y = 0;
let spiralHistory = []; 

let neuroParams = {
    deltaFreq: 2.0, deltaAmp: 0,
    thetaFreq: 6.0, thetaAmp: 0,
    alphaXAmp: 0, alphaYAmp: 0, alphaXFreq: 10, alphaYFreq: 10,
    gammaAmp: 0
};

// === AUDIO WORKLET (Идеальный микс и отсутствие щелчков) ===
async function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const workletCode = `
        const clip = (val, min, max) => Math.max(min, Math.min(val, max));

        function gaussianNoise() {
            let u = Math.max(1e-10, Math.random());
            let v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }

        class PsytranceProcessor extends AudioWorkletProcessor {
            constructor() {
                super();
                // Непрерывные таймеры
                this.timer_kick = 10.0;
                this.timer_bass = 10.0;
                
                this.last_d = 0; 
                this.last_t = 0;
                this.phase_fm_c = 0; 
                this.phase_fm_m = 0;

                this.delayBuf = [new Float32Array(88200), new Float32Array(88200)]; 
                this.delayPtr = 0;
                
                this.target = { deltaFreq:2, deltaAmp:0, thetaFreq:6, thetaAmp:0, alphaXAmp:0, alphaYAmp:0, gammaAmp:0 };
                this.sm = { f_d:2, a_d:0, f_t:6, a_t:0, a_ax:0, a_ay:0, a_g:0 };
                
                this.port.onmessage = (e) => { this.target = e.data; };
            }

            process(inputs, outputs) {
                if(!outputs[0] || !outputs[0][0]) return true;
                const outL = outputs[0][0], outR = outputs[0][1] || outL;
                const dt = 1.0 / sampleRate;

                for (let i = 0; i < outL.length; i++) {
                    // Плавное сглаживание параметров ЭЭГ
                    let smooth = 0.0005;
                    this.sm.f_d += smooth * (this.target.deltaFreq - this.sm.f_d);
                    this.sm.a_d += smooth * (this.target.deltaAmp - this.sm.a_d);
                    this.sm.f_t += smooth * (this.target.thetaFreq - this.sm.f_t);
                    this.sm.a_t += smooth * (this.target.thetaAmp - this.sm.a_t);
                    this.sm.a_ax += smooth * (this.target.alphaXAmp - this.sm.a_ax);
                    this.sm.a_ay += smooth * (this.target.alphaYAmp - this.sm.a_ay);
                    this.sm.a_g += smooth * (this.target.gammaAmp - this.sm.a_g);

                    let fd = clip(this.sm.f_d, 1.0, 4.0);
                    let ft = clip(this.sm.f_t, 3.0, 12.0);

                    // Триггеры
                    let phaseD = (this.last_d + fd * dt) % 1.0;
                    if (phaseD < this.last_d) this.timer_kick = 0;
                    this.last_d = phaseD;

                    let phaseT = (this.last_t + ft * dt) % 1.0;
                    if (phaseT < this.last_t) this.timer_bass = 0;
                    this.last_t = phaseT;

                    let kick = 0, bass = 0;

                    // KICK (Интегрирование времени дает чистый звук без треска)
                    if (this.timer_kick < 0.38) {
                        let Tk = this.timer_kick;
                        let kick_wave = Math.sin(2.0 * Math.PI * (48.0 * Tk - 3.5 * Math.exp(-55.0 * Tk))) * Math.exp(-10.0 * Tk);
                        kick = kick_wave * clip(this.sm.a_d * 2.2, 0.6, 1.6) * 1.4;
                    }
                    this.timer_kick += dt;

                    // BASS
                    if (this.timer_bass < 0.48) {
                        let Tb = this.timer_bass;
                        let bass_osc = 2.0 * ((Tb % 1.0) - 0.5) * Math.exp(-13.0 * Tb);
                        bass = Math.tanh(bass_osc * (2.2 + this.sm.a_t * 5.0)) * clip(this.sm.a_t * 1.9, 0.35, 1.0) * 1.15;
                    }
                    this.timer_bass += dt;

                    // FM LEAD
                    let c_freq = 150.0 + this.sm.a_ax * 300.0;
                    let m_freq = 50.0 + this.sm.a_ay * 100.0;
                    let m_index = 2.0 + this.sm.a_ay * 5.0;
                    
                    this.phase_fm_c = (this.phase_fm_c + c_freq * dt) % 1.0;
                    this.phase_fm_m = (this.phase_fm_m + m_freq * dt) % 1.0;
                    
                    let lead_wave = Math.sin(2.0 * Math.PI * this.phase_fm_c + m_index * Math.sin(2.0 * Math.PI * this.phase_fm_m));
                    let lead_env = Math.exp(-((phaseT * 2.0) % 1.0) * 5.0);
                    let lead = lead_wave * lead_env * clip((this.sm.a_ax - 0.06)*6, 0, 0.72) * 0.58;

                    // HATS
                    let hat_env = Math.exp(-((phaseT * 4.0) % 1.0) * 20.0);
                    let hats = gaussianNoise() * hat_env * clip(this.sm.a_g * 2.0, 0.0, 0.5);

                    // MIXING (Бочка и бас идут в ОБА канала)
                    let mixL = kick + bass + lead * 0.8 + hats;
                    let mixR = kick + bass + lead * 0.2 + hats;

                    // MASTER DRIVE
                    let drive = clip(this.sm.a_g * 1.8, 0, 1.0);
                    mixL = Math.tanh(mixL * (1.0 + drive * 1.5));
                    mixR = Math.tanh(mixR * (1.0 + drive * 1.5));

                    // DELAY
                    let delay_mix = clip(0.6 - this.sm.a_g + this.sm.a_ax, 0.1, 0.8);
                    let d_samp = Math.floor(0.28 * sampleRate);
                    let didx = (this.delayPtr - d_samp + this.delayBuf[0].length) % this.delayBuf[0].length;
                    let eL = this.delayBuf[0][didx];
                    let eR = this.delayBuf[1][didx];

                    this.delayBuf[0][this.delayPtr] = mixL + eR * 0.55;
                    this.delayBuf[1][this.delayPtr] = mixR + eL * 0.55;
                    this.delayPtr = (this.delayPtr + 1) % this.delayBuf[0].length;

                    // OUTPUT (Без потери громкости)
                    outL[i] = Math.tanh(mixL + eL * delay_mix); 
                    outR[i] = Math.tanh(mixR + eR * delay_mix);
                }
                return true;
            }
        }
        registerProcessor('psy-synth', PsytranceProcessor);
    `;

    const blob = new Blob([workletCode], { type: 'application/javascript' });
    await audioCtx.audioWorklet.addModule(URL.createObjectURL(blob));
    audioWorkletNode = new AudioWorkletNode(audioCtx, 'psy-synth');
    audioWorkletNode.connect(audioCtx.destination);
}

// === BLE CONFIGURATION ===
async function applyStageSettings(service, pga) {
    try {
        const cmdChar = await service.getCharacteristic(CMD_UUID);
        
        async function writeReg(addr, val, mask=null) {
            let cmd = mask ? new Uint8Array([addr, (val>>8)&0xFF, val&0xFF, (mask>>8)&0xFF, mask&0xFF]) : new Uint8Array([addr, (val>>8)&0xFF, val&0xFF]);
            await cmdChar.writeValueWithoutResponse(cmd);
            await new Promise(r => setTimeout(r, 150));
        }

        console.log("Setting up device...");
        await writeReg(0x08, 0x000F, 0x000F); // DC Block
        await writeReg(0x03, 7 << 2, 0x001C); // 250 SPS
        
        let pga_val = (pga<<12)|(pga<<8)|(pga<<4)|pga;
        await writeReg(0x04, pga_val);
        await writeReg(0x05, pga_val);
        
        for (let i = 0; i < 8; i++) {
            await writeReg(0x09 + i*5, 0, 0x0003); // MUX 0
        }

        const gains = {0:1, 1:2, 2:4, 3:8, 4:16, 5:32, 6:64, 7:128};
        UV_SCALE = (1.2 / gains[pga] / 8388607.0) * 1e6;
        console.log("Device configured successfully. Gain:", gains[pga]);

    } catch (err) {
        console.error("Config error: ", err);
    }
}

// === BLE CONNECTION ===
document.getElementById('btn-conn').onclick = async () => {
    try {
        await initAudio();
        document.getElementById('btn-conn').innerText = "SCANNING...";
        
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services:[SERVICE_UUID] }] });
        document.getElementById('btn-conn').innerText = "CONNECTING...";
        
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        
        const selectedGain = parseInt(document.getElementById('gain-select').value);
        await applyStageSettings(service, selectedGain);

        const dataChar = await service.getCharacteristic(CHAR_UUID);
        await dataChar.startNotifications();
        dataChar.addEventListener('characteristicvaluechanged', onData);
        
        document.getElementById('ui-layer').style.opacity = 0;
        setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 500);
        
        isRunning = true;
        lastRenderTime = performance.now();
        animateCanvas();
    } catch(e) {
        alert("Error: " + e.message);
        document.getElementById('btn-conn').innerText = "2. CONNECT & PLAY";
    }
};

function onData(e) {
    const val = new Uint8Array(e.target.value.buffer);
    let tmp = new Uint8Array(packetBuffer.length + val.length);
    tmp.set(packetBuffer); tmp.set(val, packetBuffer.length);
    packetBuffer = tmp;
    
    // Оригинальный сверхнадежный парсер пакетов
    while(packetBuffer.length >= 33) {
        let head = -1;
        for(let i=0; i<packetBuffer.length-32; i++) {
            if(packetBuffer[i]===0xA0 && packetBuffer[i+32]===0xC0) { head = i; break; }
        }
        if(head === -1) { 
            if(packetBuffer.length > 66) packetBuffer = packetBuffer.slice(-33); 
            break; 
        }
        if(head > 0) { 
            packetBuffer = packetBuffer.slice(head); 
            continue; 
        }
        
        processEEGSample(packetBuffer.slice(0, 33));
        packetBuffer = packetBuffer.slice(33);
    }
}

function processEEGSample(pkt) {
    let mean = 0;
    let raw = new Float32Array(8);
    for(let i=0; i<8; i++) {
        let v = (pkt[2+i*3]<<16) | (pkt[3+i*3]<<8) | pkt[4+i*3];
        if(v & 0x800000) v -= 0x1000000;
        raw[i] = v * UV_SCALE;
        mean += raw[i];
    }
    mean /= 8.0;

    // Сдвиг буфера
    for(let c=0; c<8; c++) {
        for(let i=0; i<BUF_SIZE-1; i++) eegBuffer[c][i] = eegBuffer[c][i+1];
        eegBuffer[c][BUF_SIZE-1] = raw[c] - mean;
    }

    processCounter++;
    if(processCounter >= 10) { 
        updateDSP(); 
        processCounter = 0; 
    }
}

function updateDSP() {
    let glob = new Float32Array(BUF_SIZE);
    let vx = new Float32Array(BUF_SIZE);
    let vy = new Float32Array(BUF_SIZE);

    for(let i=0; i<BUF_SIZE; i++) {
        let sum = 0, x = 0, y = 0;
        for(let c=0; c<8; c++) {
            sum += eegBuffer[c][i];
            x += eegBuffer[c][i] * SPATIAL_MATRIX[0][c];
            y += eegBuffer[c][i] * SPATIAL_MATRIX[1][c];
        }
        glob[i] = sum / 8.0; vx[i] = x; vy[i] = y;
    }

    let d = extractBandFeatures(glob, 1.0, 4.0);
    let t = extractBandFeatures(glob, 4.0, 8.0);
    
    // Запрашиваем не только параметры, но и 10 последних семплов ВОЛНЫ для визуализации!
    let ax = extractBandFeatures(vx, 8.0, 13.0, true);
    let ay = extractBandFeatures(vy, 8.0, 13.0, true);
    let g = extractBandFeatures(glob, 30.0, 50.0);

    neuroParams = {
        deltaFreq: isNaN(d.freq)? 2.0 : d.freq,
        deltaAmp: isNaN(d.amp)? 0 : d.amp * 2.0,
        thetaFreq: isNaN(t.freq)? 6.0 : t.freq,
        thetaAmp: isNaN(t.amp)? 0 : t.amp * 2.0,
        alphaXAmp: isNaN(ax.amp)? 0 : ax.amp,
        alphaYAmp: isNaN(ay.amp)? 0 : ay.amp,
        alphaXFreq: isNaN(ax.freq)? 10 : ax.freq,
        alphaYFreq: isNaN(ay.freq)? 10 : ay.freq,
        gammaAmp: isNaN(g.amp)? 0 : g.amp * 5.0
    };

    if(audioWorkletNode) audioWorkletNode.port.postMessage(neuroParams);

    // Добавляем 10 новых "сырых" отфильтрованных точек в историю для радара
    for(let k=0; k<10; k++) {
        spiralHistory.push({ x: ax.wave[k], y: ay.wave[k] });
    }
    if(spiralHistory.length > 250) spiralHistory.splice(0, spiralHistory.length - 250);

    // Обновляем текст
    let bpm = neuroParams.deltaFreq * 60;
    let genre = neuroParams.alphaXAmp > neuroParams.gammaAmp * 2 ? "PSYCHILL" : (neuroParams.gammaAmp > 1.0 ? "DARKPSY" : "PROGRESSIVE");
    document.getElementById('hud-bpm').innerText = `TEMPO: ${bpm.toFixed(0)} BPM`;
    document.getElementById('hud-bass').innerText = `BASS: ${neuroParams.thetaFreq.toFixed(1)} Hz`;
    document.getElementById('hud-style').innerText = `STYLE: ${genre}`;
}

// === ZOOM LOGIC ===
window.addEventListener('wheel', e => { 
    viewZoom -= e.deltaY * 0.1; 
    viewZoom = Math.max(10, Math.min(viewZoom, 5000)); 
    document.getElementById('hud-zoom').innerText = `ZOOM: x${(viewZoom/30).toFixed(1)}`; 
}, {passive:true});

let initDist = null;
window.addEventListener('touchstart', e => { 
    if(e.touches.length===2) initDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); 
});
window.addEventListener('touchmove', e => {
    if(e.touches.length===2 && initDist!==null) {
        let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        viewZoom += (dist - initDist) * 0.5; 
        viewZoom = Math.max(10, Math.min(viewZoom, 5000)); 
        initDist = dist;
        document.getElementById('hud-zoom').innerText = `ZOOM: x${(viewZoom/30).toFixed(1)}`;
    }
});

// === CANVAS VISUALIZATION ===
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d', {alpha: false});
let cx, cy;

function resize() {
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    cx = cvs.width / 2; cy = cvs.height / 2;
}
window.onresize = resize; resize();

let lastRenderTime = performance.now();

function animateCanvas(time) {
    if(!isRunning) return;
    
    // Вычисляем дельту времени
    let dt = (time - lastRenderTime) / 1000.0;
    lastRenderTime = time;
    if(dt > 0.1 || isNaN(dt)) dt = 0.016; 
    
    // Вращаем фазу спирали с частотой реального Альфа-ритма
    render_phase_x += neuroParams.alphaXFreq * dt * Math.PI * 2;
    render_phase_y += neuroParams.alphaYFreq * dt * Math.PI * 2;
    
    let x = neuroParams.alphaXAmp * Math.cos(render_phase_x);
    let y = neuroParams.alphaYAmp * Math.sin(render_phase_y);
    
    spiralHistory.push({ x, y });
    if(spiralHistory.length > 250) spiralHistory.shift();
    
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(8, 8, 8, 0.15)'; // Motion blur
    ctx.fillRect(0, 0, cvs.width, cvs.height);
    
    ctx.globalCompositeOperation = 'lighter';
    if(spiralHistory.length > 2) {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(cx + spiralHistory[0].x * viewZoom, cy + spiralHistory[0].y * viewZoom);
        
        for(let i=1; i<spiralHistory.length; i++) {
            ctx.lineTo(cx + spiralHistory[i].x * viewZoom, cy + spiralHistory[i].y * viewZoom);
        }
        ctx.strokeStyle = `rgba(0, 255, 204, 0.8)`;
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Рисуем точку впереди
        const last = spiralHistory[spiralHistory.length-1];
        ctx.beginPath();
        ctx.arc(cx + last.x * viewZoom, cy + last.y * viewZoom, 4, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.fill();
    }
    
    requestAnimationFrame(animateCanvas);
}

document.getElementById('btn-full').onclick = () => { 
    if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); 
};
</script>
