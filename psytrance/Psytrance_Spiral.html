<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergent Psytrance Spiral</title>
    <style>
        body { 
            margin: 0; background: #080808; overflow: hidden; 
            font-family: 'Courier New', monospace; color: #00ffcc;
            touch-action: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); z-index: 10; transition: opacity 0.5s;
        }
        
        button {
            background: rgba(0, 255, 204, 0.1); color: #00ffcc;
            border: 2px solid #00ffcc; padding: 20px 40px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            margin: 10px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); backdrop-filter: blur(5px);
        }
        button:active { background: #00ffcc; color: #000; }
        
        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 5;
            font-size: 16px; font-weight: bold; text-shadow: 0 0 5px #00ffcc;
            pointer-events: none;
        }
        #hud-title { font-size: 24px; margin-bottom: 10px; color: #fff; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1 style="color:white; text-shadow: 0 0 15px #fff; text-align: center;">EMERGENT PSYTRANCE<br><span style="font-size:16px; color:#00ffcc;">Alpha X/Y FM Radar</span></h1>
    <button id="btn-full">1. FULLSCREEN</button>
    <button id="btn-conn">2. CONNECT & PLAY</button>
</div>

<div id="hud">
    <div id="hud-title">FM LEAD RADAR</div>
    <div id="hud-bpm">BPM: --</div>
    <div id="hud-style">STYLE: WAITING...</div>
</div>

<canvas id="cvs"></canvas>

<script>
// === CONFIGURATION & MATH ===
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHAR_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const CMD_UUID     = "c0de0001-36e1-4688-b7f5-ea07361b26a8";
const UV_SCALE = (1.2 / 128 / 8388607.0) * 1e6; // Gain 128 (как в твоем скрипте)

// Pre-calculated Pseudo-Inverse Spatial Matrix (from Python)
const SPATIAL_MATRIX =[[-0.01353, -0.00378, -0.00378, -0.01353, -0.02619, -0.03623, -0.03623, -0.02619], // X[-0.02752, -0.01700,  0.01700,  0.02752,  0.02752,  0.01700, -0.01700, -0.02752]  // Y
];

// IIR Biquad Filter class
class Biquad {
    constructor(b0, b1, b2, a1, a2) {
        this.b =[b0, b1, b2];
        this.a = [1, a1, a2];
        this.z1 = 0; this.z2 = 0;
    }
    process(x) {
        let out = this.b[0]*x + this.z1;
        this.z1 = this.b[1]*x - this.a[1]*out + this.z2;
        this.z2 = this.b[2]*x - this.a[2]*out;
        return out;
    }
}

// Frequency estimator using zero-crossings
class FreqEstimator {
    constructor(minF, maxF, defaultF) {
        this.samples = 0; this.prev = 0; this.freq = defaultF;
        this.minF = minF; this.maxF = maxF;
    }
    process(val) {
        this.samples++;
        if (val > 0 && this.prev <= 0) { // Zero crossing rising edge
            let f = 250.0 / this.samples;
            if (f >= this.minF && f <= this.maxF) {
                this.freq = this.freq * 0.9 + f * 0.1; // Smooth
            }
            this.samples = 0;
        }
        this.prev = val;
        return this.freq;
    }
}

// Filters (designed for FS=250Hz)
const fDelta = new Biquad(0.007, 0, -0.007, -1.98, 0.985); // 1-4 Hz
const fTheta = new Biquad(0.017, 0, -0.017, -1.96, 0.965); // 4-8 Hz
const fAlphaX= new Biquad(0.025, 0, -0.025, -1.90, 0.95);  // 8-13 Hz
const fAlphaY= new Biquad(0.025, 0, -0.025, -1.90, 0.95);  // 8-13 Hz
const fGamma = new Biquad(0.100, 0, -0.100, -1.17, 0.80);  // 30-50 Hz

const freqD = new FreqEstimator(1.0, 4.0, 2.0);
const freqT = new FreqEstimator(4.0, 8.0, 6.0);

// === STATE ===
let isRunning = false;
let packetBuffer = new Uint8Array();
let spiralHistory =[]; // For canvas

let neuroParams = {
    deltaAmp: 0, deltaFreq: 2.0,
    thetaAmp: 0, thetaFreq: 6.0,
    alphaXAmp: 0, alphaYAmp: 0,
    gammaAmp: 0, leadX: 0, leadY: 0
};
let audioWorkletNode = null;

// === DSP PARSER ===
function processEEGSample(pkt) {
    let raw = new Float32Array(8);
    let mean = 0;
    for(let i=0; i<8; i++) {
        let v = (pkt[2+i*3]<<16) | (pkt[3+i*3]<<8) | pkt[4+i*3];
        if(v & 0x800000) v -= 0x1000000;
        raw[i] = v * UV_SCALE;
        mean += raw[i];
    }
    mean /= 8.0;

    let globalSig = 0, vecX = 0, vecY = 0;
    for(let i=0; i<8; i++) {
        let centered = raw[i] - mean;
        globalSig += centered;
        vecX += centered * SPATIAL_MATRIX[0][i];
        vecY += centered * SPATIAL_MATRIX[1][i];
    }
    globalSig /= 8.0;

    // 1. Filtering
    let valD = fDelta.process(globalSig);
    let valT = fTheta.process(globalSig);
    let valAx = fAlphaX.process(vecX);
    let valAy = fAlphaY.process(vecY);
    let valG = fGamma.process(globalSig);

    // 2. Amplitude Envelopes (Smooth abs)
    neuroParams.deltaAmp = neuroParams.deltaAmp * 0.98 + Math.abs(valD) * 0.02 * 2.0;
    neuroParams.thetaAmp = neuroParams.thetaAmp * 0.98 + Math.abs(valT) * 0.02 * 2.0;
    neuroParams.alphaXAmp= neuroParams.alphaXAmp* 0.98 + Math.abs(valAx)* 0.02;
    neuroParams.alphaYAmp= neuroParams.alphaYAmp* 0.98 + Math.abs(valAy)* 0.02;
    neuroParams.gammaAmp = neuroParams.gammaAmp * 0.95 + Math.abs(valG) * 0.05 * 5.0;

    // 3. Frequencies
    neuroParams.deltaFreq = freqD.process(valD);
    neuroParams.thetaFreq = freqT.process(valT);

    // 4. Raw Coordinates for Audio FM and Canvas
    neuroParams.leadX = valAx;
    neuroParams.leadY = valAy;

    // Visual History
    spiralHistory.push({ x: valAx, y: valAy, a: neuroParams.alphaXAmp + neuroParams.alphaYAmp });
    if(spiralHistory.length > 200) spiralHistory.shift();

    // UI Update
    if(Math.random() < 0.05) {
        document.getElementById('hud-bpm').innerText = `BPM: ${(neuroParams.deltaFreq * 60).toFixed(0)}`;
        let style = "PROGRESSIVE";
        if (neuroParams.alphaXAmp > neuroParams.gammaAmp * 2) style = "PSYCHILL";
        else if (neuroParams.gammaAmp > 1.0) style = "DARKPSY";
        document.getElementById('hud-style').innerText = `STYLE: ${style}`;
    }
}

// === BLE ===
async function connectBLE() {
    try {
        await initAudio();
        document.getElementById('btn-conn').innerText = "SCANNING...";
        
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services:[SERVICE_UUID] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        
        // Setup Micro-Volt gain (как в python write_and_verify)
        const cmdChar = await service.getCharacteristic(CMD_UUID);
        let val = (7 << 12) | (7 << 8) | (7 << 4) | 7;
        await cmdChar.writeValueWithoutResponse(new Uint8Array([0x04, (val>>8)&0xFF, val&0xFF]));
        await cmdChar.writeValueWithoutResponse(new Uint8Array([0x05, (val>>8)&0xFF, val&0xFF]));
        
        const dataChar = await service.getCharacteristic(CHAR_UUID);
        await dataChar.startNotifications();
        dataChar.addEventListener('characteristicvaluechanged', (e) => {
            const val = new Uint8Array(e.target.value.buffer);
            let tmp = new Uint8Array(packetBuffer.length + val.length);
            tmp.set(packetBuffer); tmp.set(val, packetBuffer.length);
            packetBuffer = tmp;
            while(packetBuffer.length >= 33) {
                let head = -1;
                for(let i=0; i<packetBuffer.length-32; i++) {
                    if(packetBuffer[i]===0xA0 && packetBuffer[i+32]===0xC0) { head = i; break; }
                }
                if(head === -1) { if(packetBuffer.length > 66) packetBuffer = packetBuffer.slice(-33); break; }
                if(head > 0) { packetBuffer = packetBuffer.slice(head); continue; }
                processEEGSample(packetBuffer.slice(0, 33));
                packetBuffer = packetBuffer.slice(33);
            }
        });
        
        document.getElementById('ui-layer').style.opacity = 0;
        setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 500);
        isRunning = true;
        animateCanvas();
    } catch(e) {
        alert("BLE Error: " + e.message);
        document.getElementById('btn-conn').innerText = "2. CONNECT & PLAY";
    }
}

// === AUDIO WORKLET (Psytrance Synth) ===
async function initAudio() {
    const audioCtx = new AudioContext({ sampleRate: 44100 });
    
    const workletCode = `
        const clip = (val, min, max) => Math.max(min, Math.min(val, max));

        class PsytranceProcessor extends AudioWorkletProcessor {
            constructor() {
                super();
                this.p = { d: 0, t: 0, fm_c: 0, fm_m: 0 }; // phases
                this.timers = { kick: 10 };
                this.delayBuf =[new Float32Array(88200), new Float32Array(88200)]; // 2 sec
                this.delayPtr = 0;
                this.np = { deltaAmp:0, deltaFreq:2, thetaAmp:0, thetaFreq:6, alphaXAmp:0, alphaYAmp:0, gammaAmp:0, leadX:0, leadY:0 };
                
                this.port.onmessage = (e) => { this.np = e.data; };
            }

            process(inputs, outputs) {
                if(!outputs[0] || !outputs[0][0]) return true;
                const outL = outputs[0][0]; const outR = outputs[0][1] || outL;
                const dt = 1.0 / sampleRate;
                const np = this.np;

                let fd = clip(np.deltaFreq, 1.0, 4.0);
                let ft = clip(np.thetaFreq, 3.0, 12.0);

                for (let i = 0; i < outL.length; i++) {
                    let mixL = 0, mixR = 0;

                    // Phase Accumulators
                    let old_pd = this.p.d;
                    this.p.d = (this.p.d + fd * dt) % 1.0;
                    this.p.t = (this.p.t + ft * dt) % 1.0;

                    // 1. KICK
                    if (this.p.d < old_pd) this.timers.kick = 0;
                    if (this.timers.kick < 0.38) {
                        let T = this.timers.kick;
                        let env = Math.exp(-(this.p.d) * 10.0);
                        let pitch = 40 + 150 * Math.exp(-(this.p.d) * 20.0);
                        mixL += Math.sin(6.2832 * pitch * this.p.d) * env * clip(np.deltaAmp*2.0, 0.5, 1.0) * 1.4;
                        this.timers.kick += dt;
                    }

                    // 2. BASS
                    let b_raw = 2.0 * (this.p.t - 0.5);
                    let b_env = Math.exp(-this.p.t * 8.0);
                    mixL += b_raw * b_env * clip(np.thetaAmp*1.5, 0.2, 0.8) * 1.15;

                    // 3. FM LEAD
                    let c_freq = 150.0 + np.alphaXAmp * 300.0;
                    let m_freq = 50.0 + np.alphaYAmp * 100.0;
                    let m_index = 2.0 + np.alphaYAmp * 5.0;
                    
                    this.p.fm_c = (this.p.fm_c + c_freq * dt) % 1.0;
                    this.p.fm_m = (this.p.fm_m + m_freq * dt) % 1.0;
                    
                    let lead_wave = Math.sin(6.2832 * this.p.fm_c + m_index * Math.sin(6.2832 * this.p.fm_m));
                    let lead_env = Math.exp(-((this.p.t * 2) % 1.0) * 5.0);
                    let lead_vol = clip((np.alphaXAmp - 0.06)*6, 0, 0.72);
                    let lead = lead_wave * lead_env * lead_vol * 0.8;
                    mixR += lead * 0.58;

                    // 4. HATS
                    let noise = Math.random() * 2 - 1;
                    let hat_env = Math.exp(-((this.p.t * 4) % 1.0) * 20.0);
                    let hats = noise * hat_env * clip(np.gammaAmp*2.0, 0, 0.5) * 0.65;
                    mixL += hats; mixR += hats;

                    // 5. MASTER & DELAY
                    mixL = Math.tanh(mixL * 2.2) * 0.0018;
                    mixR = Math.tanh(mixR * 2.2) * 0.0018;
                    
                    let drive = clip(np.gammaAmp * 1.8, 0, 1.0);
                    mixL = Math.tanh(mixL * (1.0 + drive * 2.5));
                    mixR = Math.tanh(mixR * (1.0 + drive * 2.5));

                    let d_mix = clip(0.6 - np.gammaAmp + np.alphaXAmp, 0.1, 0.8);
                    let d_samp = Math.floor(0.3 * sampleRate);
                    let didx = (this.delayPtr - d_samp + this.delayBuf[0].length) % this.delayBuf[0].length;
                    let eL = this.delayBuf[0][didx];
                    let eR = this.delayBuf[1][didx];

                    this.delayBuf[0][this.delayPtr] = mixL + eR * 0.5;
                    this.delayBuf[1][this.delayPtr] = mixR + eL * 0.5;
                    this.delayPtr = (this.delayPtr + 1) % this.delayBuf[0].length;

                    outL[i] = Math.tanh(mixL + eL * d_mix);
                    outR[i] = Math.tanh(mixR + eR * d_mix);
                }
                return true;
            }
        }
        registerProcessor('psy-synth', PsytranceProcessor);
    `;
    const blob = new Blob([workletCode], { type: 'application/javascript' });
    const workletURL = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(workletURL);
    
    audioWorkletNode = new AudioWorkletNode(audioCtx, 'psy-synth');
    audioWorkletNode.connect(audioCtx.destination);
    
    // Передаем параметры в аудиопоток 20 раз в сек
    setInterval(() => { if(isRunning) audioWorkletNode.port.postMessage(neuroParams); }, 50);
}

// === CANVAS VISUALIZATION (SPIRAL RADAR) ===
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d', {alpha: false});
let cx, cy, vScale;

function resize() {
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    cx = cvs.width / 2; cy = cvs.height / 2;
    vScale = Math.min(cx, cy) * 0.8; // Масштаб для радара
}
window.onresize = resize; resize();

function animateCanvas() {
    if(!isRunning) return;
    
    // Очистка с плавным затуханием
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
    ctx.fillRect(0, 0, cvs.width, cvs.height);
    
    // Рисуем сетку радара
    ctx.strokeStyle = 'rgba(0, 255, 204, 0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, cvs.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(cvs.width, cy); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, vScale*0.5, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, vScale, 0, Math.PI*2); ctx.stroke();

    ctx.globalCompositeOperation = 'lighter';
    
    // Отрисовка спирали (История X/Y)
    if(spiralHistory.length > 2) {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        for(let i=1; i<spiralHistory.length; i++) {
            const p1 = spiralHistory[i-1];
            const p2 = spiralHistory[i];
            
            // Нормализуем координаты (примерно подбираем множитель для красоты)
            const x1 = cx + (p1.x * 20.0) * vScale;
            const y1 = cy + (p1.y * 20.0) * vScale;
            const x2 = cx + (p2.x * 20.0) * vScale;
            const y2 = cy + (p2.y * 20.0) * vScale;
            
            // Затухание хвоста (чем старее, тем прозрачнее)
            const fade = i / spiralHistory.length;
            
            // Цвет зависит от амплитуды
            const hue = 180 - (p2.a * 100); // От бирюзового к зеленому
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${fade})`;
            ctx.lineWidth = 2 + (p2.a * 10); // Толщина от мощности мысли
            ctx.stroke();
        }
        
        // Яркая точка на текущем конце (голова спирали)
        const last = spiralHistory[spiralHistory.length-1];
        ctx.beginPath();
        ctx.arc(cx + (last.x * 20.0) * vScale, cy + (last.y * 20.0) * vScale, 5 + last.a*10, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00ffcc';
    }
    ctx.shadowBlur = 0;
    
    requestAnimationFrame(animateCanvas);
}

// === UI BINDINGS ===
document.getElementById('btn-full').onclick = () => { if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); };
document.getElementById('btn-conn').onclick = connectBLE;

</script>
</body>
</html>
