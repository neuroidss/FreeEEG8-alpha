<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neuro Dungeon: Phase Stick v5.4</title>
    <style>
        body { margin: 0; background: #050505; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.9); padding: 15px; border: 2px solid #0f0; border-radius: 8px; width: 220px; }
        .stat { font-size: 13px; margin-bottom: 5px; display: flex; justify-content: space-between; color: #0f0; }
        #synapse-bar { width: 100%; height: 6px; background: #111; margin: 10px 0; border: 1px solid #333; }
        #synapse-fill { height: 100%; background: #0ff; width: 0%; box-shadow: 0 0 10px #0ff; }
        .slider-box { margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        input[type=range] { width: 100%; accent-color: #0f0; cursor: pointer; }
        #radar { width: 100px; height: 100px; border: 1px solid #444; border-radius: 50%; margin: 10px auto; position: relative; background: #000; }
        #radar::after { content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 1px; background: rgba(255,255,255,0.1); transform: translate(-50%,-50%); }
        #radar::before { content: ''; position: absolute; top: 50%; left: 50%; height: 100%; width: 1px; background: rgba(255,255,255,0.1); transform: translate(-50%,-50%); }
        #pointer { width: 8px; height: 8px; background: #f0f; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px #f0f; z-index: 5; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button { background: #000; color: #0f0; border: 2px solid #0f0; padding: 20px 40px; font-size: 24px; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">FLOOR: <span id="lbl-floor" style="color:#fff">1</span></div>
    <div class="stat">SYNAPTIC TRACE:</div>
    <div id="synapse-bar"><div id="synapse-fill"></div></div>
    
    <div id="radar"><div id="pointer"></div></div>

    <div class="slider-box">
        <div class="stat" style="font-size: 10px;"><span>STABILITY LEVEL</span><span id="lbl-skill">0.05</span></div>
        <input type="range" id="skill-slider" min="0.001" max="1.0" step="0.001" value="0.05">
    </div>
</div>

<div id="overlay">
    <h1 style="color:#0ff; text-shadow: 0 0 20px #0ff;">PHASE DUNGEON v5.4</h1>
    <p style="color:#888; font-size: 14px; max-width: 500px;">Единый фазовый стик: Y-ход, X-поворот.<br>Коллизии восстановлены.</p>
    <button id="btn-start">CONNECT BLE</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// ГЕОМЕТРИЯ (ТВОИ УГЛЫ)
const RADIUS = 10; 
const ANGLES = [-72, -36, 36, 72, 108, 144, -144, -108].map(d => d * Math.PI / 180);
const ELECTRODES = ANGLES.map(a => ({ x: Math.cos(a) * RADIUS, y: Math.sin(a) * RADIUS }));
const UV_SCALE = (1.2 / 4.0 / 8388607.0) * 1e6;
const BUF_SIZE = 256; 

let isConnected = false;
let skillLevel = 0.05;
let synapticPersistence = 0;
let lastRawVector = { x: 0, y: 0 };
let eegBuffer = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));
let ctrl = { x: 0, y: 0 }; // x: Turn, y: Speed
let player = { x: 1.5, y: 1.5, r: 0.3, angle: 0 };
let maze;

// FFT + NOTCH
function fft(re, im) {
    const n = re.length;
    for (let i = 0, j = 0; i < n; i++) {
        if (j > i) [re[i], re[j]] = [re[j], re[i]], [im[i], im[j]] = [im[j], im[i]];
        let m = n >> 1;
        while (m >= 1 && j >= m) j -= m, m >>= 1;
        j += m;
    }
    for (let s = 2; s <= n; s <<= 1) {
        let m = s >> 1, t = -2 * Math.PI / s;
        let wr = Math.cos(t), wi = Math.sin(t);
        for (let i = 0; i < n; i += s) {
            let ar = 1, ai = 0;
            for (let j = 0; j < m; j++) {
                let u = i + j, v = u + m;
                let tr = ar * re[v] - ai * im[v], ti = ar * im[v] + ai * re[v];
                re[v] = re[u] - tr; im[v] = im[u] - ti; re[u] += tr; im[u] += ti;
                let nr = ar * wr - ai * wi; ai = ar * wi + ai * wr; ar = nr;
            }
        }
    }
}

function applyNotchFilters(re, im) {
    const n50 = Math.round(50 * BUF_SIZE / 250);
    const n100 = Math.round(100 * BUF_SIZE / 250);
    for(let k of [n50, n100]) {
        for(let i=-1; i<=1; i++) { if(re[k+i]) re[k+i]=im[k+i]=0; }
    }
}

function get_ciPLV(idxA, idxB, spectra) {
    let sum_re = 0, sum_im = 0;
    for (let k = 18; k <= 36; k++) {
        let reA = spectra[idxA].re[k], imA = spectra[idxA].im[k];
        let reB = spectra[idxB].re[k], imB = spectra[idxB].im[k];
        let mA = Math.sqrt(reA*reA + imA*imA) || 1e-6, mB = Math.sqrt(reB*reB + imB*imB) || 1e-6;
        let uAr = reA/mA, uAi = imA/mA, uBr = reB/mB, uBi = -imB/mB;
        sum_re += (uAr*uBr - uAi*uBi); sum_im += (uAr*uBi + uAi*uBr);
    }
    let mRe = sum_re/19, mIm = sum_im/19;
    let denom = Math.sqrt(Math.max(0, 1.0 - mRe*mRe));
    return denom < 0.001 ? 0 : mIm / denom;
}

class Maze {
    constructor(dim) {
        this.dim = dim; this.grid = Array.from({length: dim}, () => Array(dim).fill(1));
        this.gen(1, 1); this.grid[dim-2][dim-2] = 2;
    }
    gen(x, y) {
        this.grid[y][x] = 0;
        [[0,1],[0,-1],[1,0],[-1,0]].sort(()=>Math.random()-0.5).forEach(([dx, dy]) => {
            let nx=x+dx*2, ny=y+dy*2;
            if(nx>0 && nx<this.dim-1 && ny>0 && ny<this.dim-1 && this.grid[ny][nx]===1) {
                this.grid[y+dy][x+dx] = 0; this.gen(nx, ny);
            }
        });
    }
}

function gameLoop() {
    if(!isConnected) return;

    // CAR
    let centered = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));
    for(let t=0; t<BUF_SIZE; t++) {
        let avg = 0; for(let c=0; c<8; c++) avg += eegBuffer[c][t];
        avg /= 8;
        for(let c=0; c<8; c++) centered[c][t] = eegBuffer[c][t] - avg;
    }

    // FFT
    let spectra = centered.map(ch => {
        let re = new Float32Array(ch), im = new Float32Array(BUF_SIZE);
        fft(re, im); applyNotchFilters(re, im); return {re, im};
    });

    // TENSOR STICK (vx, vy)
    let vx = 0, vy = 0;
    for(let i=0; i<8; i++) {
        for(let j=i+1; j<8; j++) {
            let val = get_ciPLV(i, j, spectra);
            vx += val * (ELECTRODES[j].x - ELECTRODES[i].x);
            vy += val * (ELECTRODES[j].y - ELECTRODES[i].y);
        }
    }

    // Stability Trace
    let mag = Math.sqrt(vx*vx + vy*vy);
    let dot = vx * lastRawVector.x + vy * lastRawVector.y;
    let cosTheta = dot / (mag * Math.sqrt(lastRawVector.x**2 + lastRawVector.y**2) + 1e-6);
    if (mag > 0.05 && cosTheta > 0.8) synapticPersistence = Math.min(1, synapticPersistence + 0.01);
    else synapticPersistence *= 0.99;
    lastRawVector = {x: vx, y: vy};

    // Unified Physics
    const smooth = 0.96;
    ctrl.x = ctrl.x * smooth + vx * (1-smooth);
    ctrl.y = ctrl.y * smooth + vy * (1-smooth);

    // Модификаторы скорости от уровня киберности
    let boost = (1.0 + synapticPersistence * 4.0);
    
    // ПОВОРОТ (Сбалансирован: vx)
    // Коэффициент 0.015 откалиброван, чтобы танк не крутился безумно
    player.angle += ctrl.x * skillLevel * 0.4 * boost;

    // ХОД (Y отклонение: vy)
    let speed = -ctrl.y * skillLevel * 0.3 * boost;
    
    let dx = Math.sin(player.angle) * speed;
    let dy = -Math.cos(player.angle) * speed;

    // ПРАВИЛЬНЫЕ КОЛЛИЗИИ (Оригинальная логика)
    const hit = (tx, ty) => {
        let gx = Math.floor(tx), gy = Math.floor(ty);
        if(gy<0||gy>=maze.dim||gx<0||gx>=maze.dim) return true;
        return maze.grid[gy][gx] === 1;
    };
    
    // Проверка по осям для скольжения
    if(!hit(player.x + dx + Math.sign(dx)*0.1, player.y)) player.x += dx;
    if(!hit(player.x, player.y + dy + Math.sign(dy)*0.1)) player.y += dy;

    if(maze.grid[Math.floor(player.y)][Math.floor(player.x)] === 2) {
        let fl = parseInt(document.getElementById('lbl-floor').innerText) + 1;
        document.getElementById('lbl-floor').innerText = fl;
        maze = new Maze(9 + fl*2); player.x = player.y = 1.5;
    }

    // UI
    document.getElementById('synapse-fill').style.width = (synapticPersistence * 100) + '%';
    document.getElementById('pointer').style.left = (50 + ctrl.x * 4) + '%';
    document.getElementById('pointer').style.top = (50 + ctrl.y * 4) + '%';

    render();
    requestAnimationFrame(gameLoop);
}

function render() {
    const cvs = document.getElementById('gameCanvas');
    const ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,cvs.width,cvs.height);
    const cellSize = 80;
    ctx.save();
    ctx.translate(cvs.width/2, cvs.height/2);
    ctx.rotate(-player.angle);
    ctx.translate(-player.x*cellSize, -player.y*cellSize);
    for(let r=0; r<maze.dim; r++){
        for(let c=0; c<maze.dim; c++){
            if(maze.grid[r][c] === 1) {
                ctx.fillStyle = `rgb(0, ${20 + synapticPersistence*80}, 40)`;
                ctx.fillRect(c*cellSize, r*cellSize, cellSize, cellSize);
                ctx.strokeStyle = 'rgba(0,255,0,0.1)'; ctx.strokeRect(c*cellSize, r*cellSize, cellSize, cellSize);
            } else if(maze.grid[r][c] === 2) {
                ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(c*cellSize+cellSize/2, r*cellSize+cellSize/2, cellSize/3, 0, Math.PI*2); ctx.fill();
            }
        }
    }
    ctx.restore();
    ctx.save();
    ctx.translate(cvs.width/2, cvs.height/2);
    ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(0, 0, cellSize*player.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(-7, 5); ctx.lineTo(7, 5); ctx.fill();
    ctx.restore();
}

document.getElementById('skill-slider').oninput = (e) => {
    skillLevel = parseFloat(e.target.value);
    document.getElementById('lbl-skill').innerText = skillLevel.toFixed(3);
};

document.getElementById('btn-start').onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services:["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
        const dataChar = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
        const cmdChar = await service.getCharacteristic("c0de0001-36e1-4688-b7f5-ea07361b26a8");
        await cmdChar.writeValue(new Uint8Array([0x04, 0x22, 0x22])); 
        await dataChar.startNotifications();
        dataChar.addEventListener('characteristicvaluechanged', (e) => {
            let b = new Uint8Array(e.target.value.buffer);
            if(b[0] === 0xA0) {
                for(let i=0; i<8; i++) {
                    let v = (b[2+i*3]<<16) | (b[3+i*3]<<8) | b[4+i*3];
                    if(v & 0x800000) v -= 0x1000000;
                    eegBuffer[i].set(eegBuffer[i].subarray(1));
                    eegBuffer[i][BUF_SIZE-1] = v * UV_SCALE;
                }
            }
        });
        maze = new Maze(9);
        document.getElementById('overlay').style.display = 'none';
        isConnected = true;
        gameLoop();
    } catch(e) { alert(e); }
};
</script>
</body>
</html>
