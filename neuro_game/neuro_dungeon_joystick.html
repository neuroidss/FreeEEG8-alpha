<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neuro Phase Continuum: Engine</title>
    <style>
        body { margin: 0; background: #050505; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #0f0; border-radius: 8px; pointer-events: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20; text-align: center;
        }
        button {
            background: #000; color: #0f0; border: 2px solid #0f0;
            padding: 20px 40px; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 20px;
            box-shadow: 0 0 15px #0f0; transition: 0.2s; pointer-events: auto;
        }
        button:hover { background: #0f0; color: #000; }
        #radar { width: 150px; height: 150px; border: 1px solid #0f0; border-radius: 50%; margin-top: 10px; position: relative; }
        #pointer { width: 10px; height: 10px; background: #f0f; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">FLOOR: <span id="lbl-floor" style="color:#fff">1</span></div>
    <div id="radar"><div id="pointer"></div></div>
    <div style="font-size: 10px; margin-top: 5px;">PHASE VECTOR FIELD (All-to-All)</div>
</div>

<div id="overlay">
    <h1 style="color:#fff; text-shadow: 0 0 20px #0f0;">PHASE CONTINUUM</h1>
    <p style="color:#888; font-size: 18px; max-width: 600px;">
        Тензорное управление через фазовый континуум.<br>
        28 векторов когерентности бета-ритма (18-35 Гц).<br>
        Звук: Низкочастотный басовый рокот.
    </p>
    <button id="btn-start">ACTIVATE ENGINE</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// === 1. ГЕОМЕТРИЯ И НАСТРОЙКИ ===
const RADIUS_MM = 10;
const ANGLES_DEG = [-72, -36, 36, 72, 108, 144, -144, -108];
const ELECTRODES = ANGLES_DEG.map(deg => {
    const rad = deg * Math.PI / 180;
    return { x: Math.cos(rad) * RADIUS_MM, y: Math.sin(rad) * RADIUS_MM };
});

const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const DATA_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const CMD_UUID     = "c0de0001-36e1-4688-b7f5-ea07361b26a8";
const UV_SCALE = (1.2 / 4.0 / 8388607.0) * 1e6;
const BUF_SIZE = 256;

let isConnected = false;
let eegBuffer = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));
let ctrl = { x: 0, y: 0, torque: 0 };
let player = { x: 1.5, y: 1.5, r: 0.35, angle: 0 };
const cellSize = 80;

// === 2. БЫСТРЫЙ FFT ===
function reverseBits(x, n) {
    let res = 0;
    for (let i = 0; (1 << i) < n; i++) { res = (res << 1) | (x & 1); x >>= 1; }
    return res;
}
function fft(re, im) {
    const n = re.length;
    for (let i = 0; i < n; i++) {
        let j = reverseBits(i, n);
        if (j > i) { let tr=re[i], ti=im[i]; re[i]=re[j]; im[i]=im[j]; re[j]=tr; im[j]=ti; }
    }
    for (let step = 2; step <= n; step <<= 1) {
        let half = step >> 1, theta = -2 * Math.PI / step;
        let wr = Math.cos(theta), wi = Math.sin(theta);
        for (let i = 0; i < n; i += step) {
            let ar = 1, ai = 0;
            for (let j = 0; j < half; j++) {
                let i1 = i + j, i2 = i + j + half;
                let tr = ar * re[i2] - ai * im[i2], ti = ar * im[i2] + ai * re[i2];
                re[i2] = re[i1] - tr; im[i2] = im[i1] - ti; re[i1] += tr; im[i1] += ti;
                let nar = ar * wr - ai * wi, nai = ar * wi + ai * wr;
                ar = nar; ai = nai;
            }
        }
    }
}

// === 3. ciPLV (Corrected Imaginary PLV) ===
function calc_ciPLV_single(idxA, idxB, spectra, binStart, binEnd) {
    let sum_re = 0, sum_im = 0, count = 0;
    for (let k = binStart; k <= binEnd; k++) {
        let reA = spectra[idxA].re[k], imA = spectra[idxA].im[k];
        let reB = spectra[idxB].re[k], imB = spectra[idxB].im[k];
        let magA = Math.sqrt(reA*reA + imA*imA) || 1;
        let magB = Math.sqrt(reB*reB + imB*imB) || 1;
        let uA_re = reA / magA, uA_im = imA / magA;
        let uB_re = reB / magB, uB_im = -imB / magB; // Conjugate
        sum_re += (uA_re * uB_re - uA_im * uB_im);
        sum_im += (uA_re * uB_im + uA_im * uB_re);
        count++;
    }
    let mean_re = sum_re / count, mean_im = sum_im / count;
    let denom = Math.sqrt(Math.max(0, 1.0 - mean_re*mean_re));
    return (denom < 0.0001) ? 0 : mean_im / denom;
}

// === 4. АУДИО (Глубокий бас) ===
class ciPLVAudio {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.osc = this.ctx.createOscillator();
        this.osc.type = 'sawtooth';
        this.osc.frequency.value = 55; // Низкое Ля
        this.filter = this.ctx.createBiquadFilter();
        this.filter.type = 'lowpass';
        this.filter.Q.value = 10;
        this.gain = this.ctx.createGain();
        this.gain.gain.value = 0;
        this.pan = this.ctx.createStereoPanner();
        this.osc.connect(this.filter).connect(this.gain).connect(this.pan).connect(this.ctx.destination);
        this.osc.start();
    }
    update(vx, vy, torque) {
        if(this.ctx.state === 'suspended') this.ctx.resume();
        const t = this.ctx.currentTime;
        let power = Math.sqrt(vx*vx + vy*vy);
        this.filter.frequency.setTargetAtTime(100 + power * 1500, t, 0.1);
        this.gain.gain.setTargetAtTime(Math.min(0.5, power * 2), t, 0.1);
        this.pan.pan.setTargetAtTime(Math.max(-1, Math.min(1, vx * 4)), t, 0.1);
        this.osc.frequency.setTargetAtTime(55 + Math.abs(torque)*10, t, 0.1);
    }
}
let audio;

// === 5. ДВИЖОК ЛАБИРИНТА ===
class Maze {
    constructor(dim) {
        this.dim = dim; this.grid = Array.from({length: dim}, () => Array(dim).fill(1));
        this.gen(1, 1); this.grid[dim-2][dim-2] = 2; 
    }
    gen(x, y) {
        this.grid[y][x] = 0;
        [[0,1],[0,-1],[1,0],[-1,0]].sort(()=>Math.random()-0.5).forEach(([dx, dy]) => {
            let nx=x+dx*2, ny=y+dy*2;
            if(nx>0 && nx<this.dim-1 && ny>0 && ny<this.dim-1 && this.grid[ny][nx]===1) {
                this.grid[y+dy][x+dx] = 0; this.gen(nx, ny);
            }
        });
    }
}
let maze = new Maze(9);

// === 6. ЦИКЛ ИГРЫ ===
function gameLoop() {
    if(!isConnected) return;

    // 1. CAR (Common Average Reference) - центрируем сигнал
    let centered = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));
    for(let t=0; t<BUF_SIZE; t++) {
        let avg = 0;
        for(let c=0; c<8; c++) avg += eegBuffer[c][t];
        avg /= 8;
        for(let c=0; c<8; c++) centered[c][t] = eegBuffer[c][t] - avg;
    }

    // 2. FFT
    let spectra = [];
    for(let c=0; c<8; c++) {
        let re = new Float32Array(centered[c]), im = new Float32Array(BUF_SIZE);
        fft(re, im);
        spectra.push({re, im});
    }

    // 3. Вычисление результирующего вектора (All-to-All)
    let vx = 0, vy = 0, torque = 0;
    for(let i=0; i<8; i++) {
        for(let j=i+1; j<8; j++) {
            let val = calc_ciPLV_single(i, j, spectra, 18, 36); // Бета
            let dx = ELECTRODES[j].x - ELECTRODES[i].x;
            let dy = ELECTRODES[j].y - ELECTRODES[i].y;
            vx += val * dx;
            vy += val * dy;
            // Torque (вращательный момент)
            torque += val * (ELECTRODES[i].x * dy - ELECTRODES[i].y * dx);
        }
    }

    // Сглаживание и физика
    const SENSE = 0.8;
    ctrl.x = ctrl.x * 0.9 + vx * SENSE * 0.1;
    ctrl.y = ctrl.y * 0.9 + vy * SENSE * 0.1;
    ctrl.torque = ctrl.torque * 0.9 + torque * 0.1;

    // Обновление радара
    document.getElementById('pointer').style.left = (50 + ctrl.x * 40) + '%';
    document.getElementById('pointer').style.top = (50 + ctrl.y * 40) + '%';

    // Управление танком
    player.angle += ctrl.torque * 0.1;
    let speed = -ctrl.y * 0.2; 
    let moveAngle = player.angle + Math.atan2(ctrl.x, -ctrl.y);
    // Для классического управления оставим проекцию на ось танка:
    let dx = Math.sin(player.angle) * speed;
    let dy = -Math.cos(player.angle) * speed;

    const hit = (tx, ty) => {
        let gx = Math.floor(tx), gy = Math.floor(ty);
        if(gy<0||gy>=maze.dim||gx<0||gx>=maze.dim) return true;
        return maze.grid[gy][gx] === 1;
    };
    if(!hit(player.x + dx, player.y)) player.x += dx;
    if(!hit(player.x, player.y + dy)) player.y += dy;

    if(maze.grid[Math.floor(player.y)][Math.floor(player.x)] === 2) {
        let floor = parseInt(document.getElementById('lbl-floor').innerText) + 1;
        document.getElementById('lbl-floor').innerText = floor;
        maze = new Maze(9 + floor*2); player.x = player.y = 1.5;
    }

    audio.update(ctrl.x, ctrl.y, ctrl.torque);
    render();
    requestAnimationFrame(gameLoop);
}

function render() {
    const cvs = document.getElementById('gameCanvas');
    const ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,cvs.width,cvs.height);
    ctx.save();
    ctx.translate(cvs.width/2, cvs.height/2);
    ctx.rotate(-player.angle);
    ctx.translate(-player.x*cellSize, -player.y*cellSize);
    for(let r=0; r<maze.dim; r++){
        for(let c=0; c<maze.dim; c++){
            if(maze.grid[r][c] === 1) {
                ctx.fillStyle = '#1a1a20'; ctx.fillRect(c*cellSize, r*cellSize, cellSize, cellSize);
                ctx.strokeStyle = '#0f0'; ctx.lineWidth = 1; ctx.strokeRect(c*cellSize, r*cellSize, cellSize, cellSize);
            } else if(maze.grid[r][c] === 2) {
                ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(c*cellSize+cellSize/2, r*cellSize+cellSize/2, cellSize/3, 0, Math.PI*2); ctx.fill();
            }
        }
    }
    ctx.restore();
    ctx.save();
    ctx.translate(cvs.width/2, cvs.height/2);
    ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(0, 0, cellSize*player.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(0, -cellSize*player.r - 10); ctx.lineTo(-10, -cellSize*player.r + 5); ctx.lineTo(10, -cellSize*player.r + 5); ctx.fill();
    ctx.restore();
}

// === 7. BLE СВЯЗЬ ===
document.getElementById('btn-start').onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services:[SERVICE_UUID] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const cmdChar = await service.getCharacteristic(CMD_UUID);
        const dataChar = await service.getCharacteristic(DATA_UUID);

        let pga = 2, val = (pga << 12) | (pga << 8) | (pga << 4) | pga;
        await cmdChar.writeValue(new Uint8Array([0x04, (val>>8)&0xFF, val&0xFF]));
        await new Promise(r => setTimeout(r, 100));
        await cmdChar.writeValue(new Uint8Array([0x05, (val>>8)&0xFF, val&0xFF]));

        await dataChar.startNotifications();
        dataChar.addEventListener('characteristicvaluechanged', (e) => {
            let b = new Uint8Array(e.target.value.buffer);
            if(b[0] === 0xA0) {
                for(let i=0; i<8; i++) {
                    let s = 2 + i*3;
                    let v = (b[s]<<16) | (b[s+1]<<8) | b[s+2];
                    if(v & 0x800000) v -= 0x1000000;
                    eegBuffer[i].set(eegBuffer[i].subarray(1));
                    eegBuffer[i][BUF_SIZE-1] = v * UV_SCALE;
                }
            }
        });
        audio = new ciPLVAudio();
        document.getElementById('overlay').style.display = 'none';
        isConnected = true;
        requestAnimationFrame(gameLoop);
    } catch(e) { alert(e); }
};
</script>
</body>
</html>
