<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neuro-Choreographer V18 PS Style</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        * { box-sizing: border-box; touch-action: none; } /* Запрещаем прокрутку и зум */
        body {
            background: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
        #overlay h1 {
            border: 3px solid var(--neon);
            padding: 30px;
            box-shadow: 0 0 20px var(--neon);
            text-align: center;
            font-size: clamp(1rem, 5vw, 2rem);
        }

        #container {
            display: flex;
            flex-direction: column;
            height: 100%;
            flex: 1;
            min-height: 0;
        }
        
        #top-ui {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1 1 auto;
            min-height: 0;
        }
        
        .side {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #111;
        }
        .joy-zone {
            width: min(200px, 40vw);
            height: min(200px, 40vw);
            background: #0a0a0a;
            border-radius: 50%;
            border: 2px solid #222;
            position: relative;
        }
        .handle {
            width: min(60px, 15vw);
            height: min(60px, 15vw);
            background: var(--neon);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            margin: calc(min(60px, 15vw) / -2);
            box-shadow: 0 0 20px var(--neon);
            pointer-events: none;
        }

        /* Панель кнопок — адаптивная, с прокруткой */
        #fx-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #000;
            border-top: 1px solid #222;
            flex: 0 0 auto;
            max-height: 30vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--neon) #111;
        }
        #fx-panel::-webkit-scrollbar {
            width: 6px;
        }
        #fx-panel::-webkit-scrollbar-track {
            background: #111;
        }
        #fx-panel::-webkit-scrollbar-thumb {
            background: var(--neon);
            border-radius: 3px;
        }

        .fx-btn {
            width: 55px;
            height: 55px;
            border: 2px solid var(--neon);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            transition: 0.1s;
            cursor: pointer;
            background: #0a0a0a;
            flex-shrink: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .fx-btn.active {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 15px var(--neon);
        }
        
        @media (max-width: 400px) {
            .fx-btn {
                width: 45px;
                height: 45px;
                font-size: 10px;
            }
        }
        
        #debug {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            opacity: 0.8;
            pointer-events: none;
            color: var(--neon);
            text-shadow: 0 0 5px var(--neon);
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="overlay"><h1>⚡ NEURAL LINK: INITIALIZE ⚡</h1></div>
<div id="debug">RHYTHM: ADAPTIVE 🔄 | ENGINE: WEB-AUDIO GPU-STYLE</div>

<div id="container">
    <div id="top-ui">
        <!-- Левая половина: стик + L1/L2 -->
        <div class="side">
            <div class="joy-zone" id="l-zone"><div class="handle" id="l-handle"></div></div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <div class="fx-btn" id="LB">L1</div>
                <div class="fx-btn" id="LT">L2</div>
            </div>
        </div>
        <!-- Правая половина: стик + R1/R2 -->
        <div class="side">
            <div class="joy-zone" id="r-zone"><div class="handle" id="r-handle"></div></div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <div class="fx-btn" id="RB">R1</div>
                <div class="fx-btn" id="RT">R2</div>
            </div>
        </div>
    </div>

    <!-- Нижняя панель с кнопками в стиле PS -->
    <div id="fx-panel">
        <!-- Кнопки левого блока -->
        <div class="fx-btn" id="BTN_DR">DR</div>
        <div class="fx-btn" id="BTN_NL">NL</div>
        <div class="fx-btn" id="BTN_NR">NR</div>
        <div class="fx-btn" id="BTN_LK">🔒</div>
        <!-- Основные кнопки PlayStation -->
        <div class="fx-btn" id="BTN_SQ">□</div>
        <div class="fx-btn" id="BTN_TR">△</div>
        <div class="fx-btn" id="BTN_CI">○</div>
        <div class="fx-btn" id="BTN_CR">✕</div>
    </div>
</div>

<script>
/** --- AUDIO WORKLET (без изменений) --- **/
const workletCode = `
class PsyEngine extends AudioWorkletProcessor {
    constructor() {
        super();
        this.fs = 44100;
        this.numStrings = 6;
        this.octaves = 4;
        this.ratios = [1.0, 1.334, 1.781, 2.378, 2.848, 3.75];
        this.phases = Array.from({length: 6}, () => new Float32Array(4));
        this.subPhase = 0; this.zapPhase = 0; this.kickPhase = 0;
        this.amps = new Float32Array(6);
        
        this.delayBuf = new Float32Array(44100 * 3);
        this.ptr = 0;

        this.rootPos = 0; this.minor = 1.0; this.sept = 0; this.sustain = 0.99;
        this.feedback = 0; this.warp = 1.0; this.delaySamples = 22050;
        this.heat = 1.2; this.subActive = 0; this.zapActive = 0; 
        this.drumsActive = 0; this.glitch = 0; this.noiseL = 0; this.noiseR = 0;

        this.port.onmessage = (e) => {
            if(e.data.pluck !== undefined) this.amps[e.data.pluck] = 2.0;
            else Object.assign(this, e.data);
        };
    }

    process(inputs, outputs) {
        const output = outputs[0][0];
        const baseF = 41.2 * Math.pow(2, this.rootPos);
        
        for (let i = 0; i < output.length; i++) {
            let wave = 0;
            const t = i / this.fs;

            // 1. Shepard Guitar
            for (let s = 0; s < 6; s++) {
                let fStr = baseF * this.ratios[s];
                if (s === 3) fStr *= this.minor;
                if (s === 5) fStr *= (1 * (1 - this.sept) + 0.89 * this.sept);

                for (let o = 0; o < this.octaves; o++) {
                    const freq = fStr * Math.pow(2, o + this.rootPos);
                    const weight = Math.pow(Math.sin(Math.PI * (o + this.rootPos) / this.octaves), 2);
                    this.phases[s][o] = (this.phases[s][o] + (2 * Math.PI * freq) / this.fs) % (2 * Math.PI);
                    let saw = (this.phases[s][o] / Math.PI) - 1.0;
                    wave += saw * weight * this.amps[s];
                }
                this.amps[s] *= this.sustain;
            }

            // 2. Sub-Bass
            if (this.subActive) {
                for (let o = 0; o < 2; o++) {
                    const sf = (baseF * 0.5) * Math.pow(2, o + this.rootPos);
                    this.subPhase = (this.subPhase + (2 * Math.PI * sf) / this.fs) % (2 * Math.PI);
                    wave += Math.sin(this.subPhase) * 0.8;
                }
            }

            // 3. Drums
            if (this.drumsActive) {
                let beatIdx = (this.ptr % this.delaySamples) / this.delaySamples;
                let kEnv = Math.exp(-beatIdx * 15);
                let kFreq = kEnv * 150 + 40;
                this.kickPhase += (2 * Math.PI * kFreq) / this.fs;
                wave += Math.sin(this.kickPhase) * kEnv * 1.5;
                if (Math.random() < 0.05 * Math.exp(-((this.ptr % (this.delaySamples/4))/(this.delaySamples/4))*20)) wave += (Math.random()-0.5)*0.5;
            }

            // 4. Noise
            if (this.noiseL) wave += (Math.random()-0.5) * 0.1;
            if (this.noiseR) wave += (Math.random()-0.5) * 0.4 * Math.random();

            wave = Math.tanh(wave * this.heat);

            // 5. Delay
            let dTime = Math.floor(this.delaySamples * this.warp);
            let readPtr = (this.ptr - dTime + this.delayBuf.length) % this.delayBuf.length;
            let echo = this.delayBuf[readPtr];
            this.delayBuf[this.ptr] = wave + echo * this.feedback;
            
            let final = wave + echo * 0.4;
            if (this.glitch) final = this.delayBuf[(this.ptr - 512 + this.delayBuf.length) % this.delayBuf.length];

            output[i] = final * 0.3;
            this.ptr = (this.ptr + 1) % this.delayBuf.length;
        }
        return true;
    }
}
registerProcessor('psy-engine', PsyEngine);
`;

/** --- UI с поддержкой мультитач --- **/
let audioCtx, psyNode;
let lastStrum = performance.now();
let intervals = [500, 500];
let rhythmLocked = false;

// Инициализация аудио по клику на оверлей
async function init() {
    if (audioCtx) return;
    audioCtx = new AudioContext();
    const blob = new Blob([workletCode], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(url);
    psyNode = new AudioWorkletNode(audioCtx, 'psy-engine');
    psyNode.connect(audioCtx.destination);
    document.getElementById('overlay').style.display = 'none';
}
document.getElementById('overlay').onclick = init;

/**
 * Настройка джойстика с мультитач поддержкой.
 * Запоминаем identifier касания, которое попало в зону.
 */
function setupJoy(zoneId, handleId, isLeft) {
    const zone = document.getElementById(zoneId);
    const handle = document.getElementById(handleId);
    let activeTouchId = null; // идентификатор активного касания

    function handleStart(e) {
        e.preventDefault();
        const touch = e.touches[0];
        // Проверяем, что касание произошло внутри зоны
        const rect = zone.getBoundingClientRect();
        const x = touch.clientX, y = touch.clientY;
        if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
            activeTouchId = touch.identifier;
            moveHandler(touch); // сразу обновить позицию
        }
    }

    function handleMove(e) {
        if (activeTouchId === null) return;
        e.preventDefault();
        // Ищем касание с сохранённым идентификатором
        for (let i = 0; i < e.touches.length; i++) {
            const touch = e.touches[i];
            if (touch.identifier === activeTouchId) {
                moveHandler(touch);
                break;
            }
        }
    }

    function handleEnd(e) {
        if (activeTouchId === null) return;
        e.preventDefault();
        // Проверяем, осталось ли активное касание в списке
        let stillActive = false;
        for (let i = 0; i < e.touches.length; i++) {
            if (e.touches[i].identifier === activeTouchId) {
                stillActive = true;
                break;
            }
        }
        if (!stillActive) {
            activeTouchId = null;
            handle.style.transform = ''; // возвращаем в центр
        }
    }

    function moveHandler(touch) {
        const rect = zone.getBoundingClientRect();
        const x = (touch.clientX - rect.left - rect.width/2) / (rect.width/2);
        const y = (touch.clientY - rect.top - rect.height/2) / (rect.height/2);
        const nx = Math.max(-1, Math.min(1, x));
        const ny = Math.max(-1, Math.min(1, y));
        handle.style.transform = `translate(${nx*60}px, ${ny*60}px)`;

        if (isLeft) {
            // Левый стик: rootPos
            const angle = (Math.atan2(nx, -ny) + Math.PI) / (2 * Math.PI);
            psyNode?.port.postMessage({ rootPos: angle });
        } else {
            // Правый стик: warp + strum
            psyNode?.port.postMessage({ warp: 0.9 + ((nx + 1)/2)*0.2 });
            const ry = -ny; // инвертируем Y, чтобы вверх было положительно
            processStrum(ry);
        }
    }

    // Функция страма (вынесена для доступа к общим переменным)
    const fired = new Array(6).fill(false);
    function processStrum(ry) {
        if (Math.abs(ry) < 0.1) fired.fill(false);
        const th = [0.15, 0.3, 0.45, 0.6, 0.75, 0.9];
        
        const trigger = (idx) => {
            psyNode?.port.postMessage({ pluck: idx });
            fired[idx] = true;
            
            if (!rhythmLocked) {
                const now = performance.now();
                if (now - lastStrum > 80 && now - lastStrum < 2000) {
                    intervals.push(now - lastStrum);
                    if (intervals.length > 4) intervals.shift();
                    const avg = intervals.reduce((a,b)=>a+b,0) / intervals.length;
                    psyNode?.port.postMessage({ delaySamples: Math.floor((avg/1000)*44100) });
                }
                lastStrum = now;
            }
        };
        
        if (ry > 0.1) {
            th.forEach((t, i) => {
                if (ry > t && !fired[i]) trigger(i);
            });
        } else if (ry < -0.1) {
            th.forEach((t, i) => {
                if (Math.abs(ry) > t && !fired[5-i]) trigger(5-i);
            });
        }
    }

    zone.addEventListener('touchstart', handleStart, { passive: false });
    zone.addEventListener('touchmove', handleMove, { passive: false });
    zone.addEventListener('touchend', handleEnd, { passive: false });
    zone.addEventListener('touchcancel', handleEnd, { passive: false });

    // Для мыши (отладка на десктопе)
    zone.addEventListener('mousedown', (e) => {
        e.preventDefault();
        // эмулируем одно касание
        activeTouchId = 'mouse';
        const rect = zone.getBoundingClientRect();
        const x = (e.clientX - rect.left - rect.width/2) / (rect.width/2);
        const y = (e.clientY - rect.top - rect.height/2) / (rect.height/2);
        const nx = Math.max(-1, Math.min(1, x));
        const ny = Math.max(-1, Math.min(1, y));
        handle.style.transform = `translate(${nx*60}px, ${ny*60}px)`;
        if (isLeft) {
            const angle = (Math.atan2(nx, -ny) + Math.PI) / (2 * Math.PI);
            psyNode?.port.postMessage({ rootPos: angle });
        } else {
            psyNode?.port.postMessage({ warp: 0.9 + ((nx + 1)/2)*0.2 });
            processStrum(-ny);
        }
    });
    window.addEventListener('mousemove', (e) => {
        if (activeTouchId !== 'mouse') return;
        e.preventDefault();
        const rect = zone.getBoundingClientRect();
        const x = (e.clientX - rect.left - rect.width/2) / (rect.width/2);
        const y = (e.clientY - rect.top - rect.height/2) / (rect.height/2);
        const nx = Math.max(-1, Math.min(1, x));
        const ny = Math.max(-1, Math.min(1, y));
        handle.style.transform = `translate(${nx*60}px, ${ny*60}px)`;
        if (isLeft) {
            const angle = (Math.atan2(nx, -ny) + Math.PI) / (2 * Math.PI);
            psyNode?.port.postMessage({ rootPos: angle });
        } else {
            psyNode?.port.postMessage({ warp: 0.9 + ((nx + 1)/2)*0.2 });
            processStrum(-ny);
        }
    });
    window.addEventListener('mouseup', () => {
        if (activeTouchId === 'mouse') {
            activeTouchId = null;
            handle.style.transform = '';
        }
    });
}

// Инициализация джойстиков
setupJoy('l-zone', 'l-handle', true);
setupJoy('r-zone', 'r-handle', false);

/**
 * Улучшенная привязка кнопок с поддержкой мультитач.
 * Для нетогловых кнопок: активна пока касание удерживается.
 * Для тогловых (isToggle=true): переключается по первому касанию.
 */
function bindButton(id, param, valOn, valOff, isToggle = false) {
    const el = document.getElementById(id);
    // Для тогловых храним состояние
    let toggleState = false;
    // Множество активных идентификаторов касаний для этой кнопки
    const activeTouches = new Set();

    function activate() {
        if (isToggle) {
            toggleState = !toggleState;
            el.classList.toggle('active', toggleState);
            const msg = {};
            msg[param] = toggleState ? valOn : valOff;
            psyNode?.port.postMessage(msg);
        } else {
            // Если уже активно другим касанием, не меняем
            if (activeTouches.size === 0) {
                el.classList.add('active');
                const msg = {};
                msg[param] = valOn;
                psyNode?.port.postMessage(msg);
            }
        }
    }

    function deactivate() {
        if (!isToggle) {
            // Деактивируем только если не осталось активных касаний
            if (activeTouches.size === 0) {
                el.classList.remove('active');
                const msg = {};
                msg[param] = valOff;
                psyNode?.port.postMessage(msg);
            }
        }
    }

    el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.touches.length; i++) {
            const touch = e.touches[i];
            if (!activeTouches.has(touch.identifier)) {
                activeTouches.add(touch.identifier);
                activate();
            }
        }
    });

    el.addEventListener('touchend', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            const touch = e.changedTouches[i];
            activeTouches.delete(touch.identifier);
        }
        deactivate();
    });

    el.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            const touch = e.changedTouches[i];
            activeTouches.delete(touch.identifier);
        }
        deactivate();
    });

    // Для мыши (отладка)
    el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        if (!isToggle) {
            el.classList.add('active');
            const msg = {};
            msg[param] = valOn;
            psyNode?.port.postMessage(msg);
        } else {
            toggleState = !toggleState;
            el.classList.toggle('active', toggleState);
            const msg = {};
            msg[param] = toggleState ? valOn : valOff;
            psyNode?.port.postMessage(msg);
        }
    });
    if (!isToggle) {
        el.addEventListener('mouseup', () => {
            el.classList.remove('active');
            const msg = {};
            msg[param] = valOff;
            psyNode?.port.postMessage(msg);
        });
        el.addEventListener('mouseleave', () => {
            el.classList.remove('active');
            const msg = {};
            msg[param] = valOff;
            psyNode?.port.postMessage(msg);
        });
    }
}

// Специальная обработка для LOCK (обновляет debug)
function bindLock(id) {
    const el = document.getElementById(id);
    let lockState = false;
    const activeTouches = new Set();

    el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.touches.length; i++) {
            const touch = e.touches[i];
            if (!activeTouches.has(touch.identifier)) {
                activeTouches.add(touch.identifier);
                // Переключаем состояние
                lockState = !lockState;
                rhythmLocked = lockState;
                el.classList.toggle('active', lockState);
                document.getElementById('debug').innerHTML = 
                    `RHYTHM: ${lockState ? 'LOCKED 🔒' : 'ADAPTIVE 🔄'} | ENGINE: WEB-AUDIO GPU-STYLE`;
            }
        }
    });

    el.addEventListener('touchend', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            const touch = e.changedTouches[i];
            activeTouches.delete(touch.identifier);
        }
    });

    el.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            const touch = e.changedTouches[i];
            activeTouches.delete(touch.identifier);
        }
    });

    // Мышь
    el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        lockState = !lockState;
        rhythmLocked = lockState;
        el.classList.toggle('active', lockState);
        document.getElementById('debug').innerHTML = 
            `RHYTHM: ${lockState ? 'LOCKED 🔒' : 'ADAPTIVE 🔄'} | ENGINE: WEB-AUDIO GPU-STYLE`;
    });
}

// Привязываем все кнопки
bindButton('LB', 'minor', 0.89, 1.0);
bindButton('LT', 'sept', 0.8, 0.0);
bindButton('RB', 'heat', 4.0, 1.2);
bindButton('RT', 'feedback', 0.8, 0.0);
bindButton('BTN_SQ', 'glitch', 1, 0);
bindButton('BTN_TR', 'zapActive', 1, 0);
bindButton('BTN_CI', 'heat', 15.0, 1.2);   // используем heat для эффекта "acid"
bindButton('BTN_CR', 'subActive', 1, 0);
bindButton('BTN_DR', 'drumsActive', 1, 0, true); // toggle
bindButton('BTN_NL', 'noiseL', 1, 0);
bindButton('BTN_NR', 'noiseR', 1, 0);
bindLock('BTN_LK');

</script>
</body>
</html>
