<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neuro Phase Engine: Cyber Evolution</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #0f0; border-radius: 8px; width: 220px; pointer-events: none; }
        .stat { font-size: 13px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .val { color: #fff; }
        #synapse-bar { width: 100%; height: 4px; background: #111; margin-top: 5px; border: 1px solid #333; }
        #synapse-fill { height: 100%; background: #0ff; width: 0%; transition: 0.1s; box-shadow: 0 0 10px #0ff; }
        #radar { width: 100px; height: 100px; border: 1px solid #444; border-radius: 50%; margin: 10px auto; position: relative; }
        #pointer { width: 6px; height: 6px; background: #f0f; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        button { background: #000; color: #0f0; border: 2px solid #0f0; padding: 20px 40px; font-size: 24px; cursor: pointer; box-shadow: 0 0 15px #0f0; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">FLOOR: <span id="lbl-floor" class="val">1</span></div>
    <div class="stat">SYNAPTIC GAIN: <span id="lbl-gain" class="val">1.0x</span></div>
    <div id="synapse-bar"><div id="synapse-fill"></div></div>
    <div id="radar"><div id="pointer"></div></div>
    <div style="font-size: 9px; color: #666; text-align: center;">FORWARD MODEL STABILITY</div>
</div>

<div id="overlay">
    <h1 style="color:#0ff; text-shadow: 0 0 20px #0ff;">NEURO CYBER ENGINE</h1>
    <p style="color:#888; max-width: 500px;">Стабилизируйте фазовый вектор, чтобы нарастить "Синаптическую Силу".<br>Мозг обучается через предсказание и тишину.</p>
    <button id="btn-start">SYNC NEURONS</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// --- КОНФИГУРАЦИЯ ---
const RADIUS = 10;
const ANGLES = [-72, -36, 36, 72, 108, 144, -144, -108].map(d => d * Math.PI / 180);
const ELECTRODES = ANGLES.map(a => ({ x: Math.cos(a) * RADIUS, y: Math.sin(a) * RADIUS }));
const UV_SCALE = (1.2 / 4.0 / 8388607.0) * 1e6;
const BUF_SIZE = 256;

let isConnected = false;
let eegBuffer = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));
let player = { x: 1.5, y: 1.5, r: 0.35, angle: 0 };
let maze;

// Состояние "Синаптической памяти"
let synapticPersistence = 0; // 0..1
let lastVector = { x: 0, y: 0 };
let ctrl = { x: 0, y: 0, torque: 0 };

// --- МАТЕМАТИКА ---
function fft(re, im) {
    const n = re.length;
    for (let i = 0, j = 0; i < n; i++) {
        if (j > i) [re[i], re[j]] = [re[j], re[i]], [im[i], im[j]] = [im[j], im[i]];
        let m = n >> 1;
        while (m >= 1 && j >= m) j -= m, m >>= 1;
        j += m;
    }
    for (let s = 2; s <= n; s <<= 1) {
        let m = s >> 1, t = -2 * Math.PI / s;
        let wr = Math.cos(t), wi = Math.sin(t);
        for (let i = 0; i < n; i += s) {
            let ar = 1, ai = 0;
            for (let j = 0; j < m; j++) {
                let u = i + j, v = u + m;
                let tr = ar * re[v] - ai * im[v], ti = ar * im[v] + ai * re[v];
                re[v] = re[u] - tr; im[v] = im[u] - ti; re[u] += tr; im[u] += ti;
                let nr = ar * wr - ai * wi; ai = ar * wi + ai * wr; ar = nr;
            }
        }
    }
}

function get_ciPLV(idxA, idxB, spectra) {
    let sum_re = 0, sum_im = 0;
    const b1 = 18, b2 = 36; // Beta 18-36Hz
    for (let k = b1; k <= b2; k++) {
        let reA = spectra[idxA].re[k], imA = spectra[idxA].im[k];
        let reB = spectra[idxB].re[k], imB = spectra[idxB].im[k];
        let mA = Math.sqrt(reA*reA + imA*imA) || 1e-6, mB = Math.sqrt(reB*reB + imB*imB) || 1e-6;
        let uAr = reA/mA, uAi = imA/mA, uBr = reB/mB, uBi = -imB/mB;
        sum_re += (uAr*uBr - uAi*uBi); sum_im += (uAr*uBi + uAi*uBr);
    }
    let mRe = sum_re/19, mIm = sum_im/19;
    let denom = Math.sqrt(Math.max(0, 1.0 - mRe*mRe));
    return denom < 0.001 ? 0 : mIm / denom;
}

// --- АУДИО (Miller Feedback) ---
class CyberAudio {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.osc = this.ctx.createOscillator();
        this.osc.type = 'sawtooth';
        this.osc.frequency.value = 50;
        this.filter = this.ctx.createBiquadFilter();
        this.filter.type = 'lowpass';
        this.filter.Q.value = 15;
        this.noise = this.ctx.createGain(); // Шум предсказания
        this.gain = this.ctx.createGain();
        this.osc.connect(this.filter).connect(this.gain).connect(this.ctx.destination);
        this.osc.start();
    }
    update(mag, torque, stability) {
        if(this.ctx.state === 'suspended') this.ctx.resume();
        const t = this.ctx.currentTime;
        // Чем ниже стабильность, тем больше "грязи" в звуке (дисторшн)
        this.filter.Q.setTargetAtTime(5 + (1-stability)*25, t, 0.1);
        this.filter.frequency.setTargetAtTime(100 + mag * 2000 * stability, t, 0.1);
        this.gain.gain.setTargetAtTime(mag * 0.5, t, 0.1);
        this.osc.frequency.setTargetAtTime(50 + torque * 20, t, 0.1);
    }
}
let audio;

// --- ЛАБИРИНТ ---
class Maze {
    constructor(dim) {
        this.dim = dim; this.grid = Array.from({length: dim}, () => Array(dim).fill(1));
        this.gen(1, 1); this.grid[dim-2][dim-2] = 2;
    }
    gen(x, y) {
        this.grid[y][x] = 0;
        [[0,1],[0,-1],[1,0],[-1,0]].sort(()=>Math.random()-0.5).forEach(([dx, dy]) => {
            let nx=x+dx*2, ny=y+dy*2;
            if(nx>0 && nx<this.dim-1 && ny>0 && ny<this.dim-1 && this.grid[ny][nx]===1) {
                this.grid[y+dy][x+dx] = 0; this.gen(nx, ny);
            }
        });
    }
}

// --- ОСНОВНОЙ ЦИКЛ ---
function gameLoop() {
    if(!isConnected) return;

    // 1. CAR + FFT
    let centered = Array.from({length: 8}, () => new Float32Array(BUF_SIZE));
    for(let t=0; t<BUF_SIZE; t++) {
        let avg = 0; for(let c=0; c<8; c++) avg += eegBuffer[c][t];
        avg /= 8;
        for(let c=0; c<8; c++) centered[c][t] = eegBuffer[c][t] - avg;
    }
    let spectra = centered.map(ch => {
        let re = new Float32Array(ch), im = new Float32Array(BUF_SIZE);
        fft(re, im); return {re, im};
    });

    // 2. ВЕКТОРНЫЙ ТЕНЗОР
    let vx = 0, vy = 0, tq = 0;
    for(let i=0; i<8; i++) {
        for(let j=i+1; j<8; j++) {
            let val = get_ciPLV(i, j, spectra);
            let dx = ELECTRODES[j].x - ELECTRODES[i].x;
            let dy = ELECTRODES[j].y - ELECTRODES[i].y;
            vx += val * dx; vy += val * dy;
            tq += val * (ELECTRODES[i].x * dy - ELECTRODES[i].y * dx);
        }
    }

    // 3. FORWARD MODEL (Сравнение с прошлым)
    // Скалярное произведение текущего вектора и прошлого
    let dot = vx * lastVector.x + vy * lastVector.y;
    let mag = Math.sqrt(vx*vx + vy*vy);
    let lastMag = Math.sqrt(lastVector.x*lastVector.x + lastVector.y*lastVector.y);
    
    // Если направление совпадает, persistence растет
    if (mag > 0.01 && dot / (mag * lastMag + 1e-6) > 0.8) {
        synapticPersistence = Math.min(1, synapticPersistence + 0.02);
    } else {
        synapticPersistence *= 0.95; // Быстрый сброс при шуме
    }

    lastVector = { x: vx, y: vy };

    // 4. ФИЗИКА (С учетом синаптического усиления)
    // Навык Cyber (1.0) требует стабильности > 0.9
    let cyberMult = 1.0 + synapticPersistence * 5.0; 
    ctrl.x = ctrl.x * 0.9 + vx * 0.1;
    ctrl.y = ctrl.y * 0.9 + vy * 0.1;
    ctrl.torque = ctrl.torque * 0.9 + tq * 0.1;

    // UI
    document.getElementById('synapse-fill').style.width = (synapticPersistence * 100) + '%';
    document.getElementById('lbl-gain').innerText = cyberMult.toFixed(1) + 'x';
    document.getElementById('pointer').style.left = (50 + ctrl.x * 3) + '%';
    document.getElementById('pointer').style.top = (50 + ctrl.y * 3) + '%';

    // Движение танка
    player.angle += ctrl.torque * 0.08;
    let speed = -ctrl.y * 0.05 * cyberMult;
    player.x += Math.sin(player.angle) * speed;
    player.y -= Math.cos(player.angle) * speed;

    // Коллизии
    if(maze.grid[Math.floor(player.y)][Math.floor(player.x)] === 1) {
        player.x -= Math.sin(player.angle) * speed;
        player.y += Math.cos(player.angle) * speed;
        synapticPersistence *= 0.5; // Удар о стену сбивает фокус
    }

    if(maze.grid[Math.floor(player.y)][Math.floor(player.x)] === 2) {
        maze = new Maze(maze.dim + 2); player.x = player.y = 1.5;
        document.getElementById('lbl-floor').innerText = (maze.dim-7)/2;
    }

    audio.update(mag, tq, synapticPersistence);
    render();
    requestAnimationFrame(gameLoop);
}

function render() {
    const cvs = document.getElementById('gameCanvas');
    const ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0,cvs.width,cvs.height);
    
    const cellSize = 80;
    ctx.save();
    ctx.translate(cvs.width/2, cvs.height/2);
    ctx.rotate(-player.angle);
    ctx.translate(-player.x*cellSize, -player.y*cellSize);
    
    for(let r=0; r<maze.dim; r++){
        for(let c=0; c<maze.dim; c++){
            if(maze.grid[r][c] === 1) {
                // Эффект "Cyber": стены светятся в зависимости от стабильности
                ctx.fillStyle = `rgb(0, ${20 + synapticPersistence*100}, ${10 + synapticPersistence*50})`;
                ctx.fillRect(c*cellSize, r*cellSize, cellSize, cellSize);
                ctx.strokeStyle = '#040'; ctx.strokeRect(c*cellSize, r*cellSize, cellSize, cellSize);
            } else if(maze.grid[r][c] === 2) {
                ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(c*cellSize+cellSize/2, r*cellSize+cellSize/2, cellSize/3, 0, Math.PI*2); ctx.fill();
            }
        }
    }
    ctx.restore();

    // Отрисовка игрока
    ctx.save();
    ctx.translate(cvs.width/2, cvs.height/2);
    // Аура предсказания
    let grad = ctx.createRadialGradient(0,0,5, 0,0, 20 + synapticPersistence*40);
    grad.addColorStop(0, `rgba(0, 255, 255, ${0.2 + synapticPersistence*0.5})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0,0, 60, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(0, 0, cellSize*player.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(-8, 5); ctx.lineTo(8, 5); ctx.fill();
    ctx.restore();
}

// --- BLE ---
document.getElementById('btn-start').onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services:["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
        const dataChar = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
        const cmdChar = await service.getCharacteristic("c0de0001-36e1-4688-b7f5-ea07361b26a8");

        await cmdChar.writeValue(new Uint8Array([0x04, 0x22, 0x22])); // PGA 4
        await dataChar.startNotifications();
        dataChar.addEventListener('characteristicvaluechanged', (e) => {
            let b = new Uint8Array(e.target.value.buffer);
            if(b[0] === 0xA0) {
                for(let i=0; i<8; i++) {
                    let v = (b[2+i*3]<<16) | (b[3+i*3]<<8) | b[4+i*3];
                    if(v & 0x800000) v -= 0x1000000;
                    eegBuffer[i].set(eegBuffer[i].subarray(1));
                    eegBuffer[i][BUF_SIZE-1] = v * UV_SCALE;
                }
            }
        });

        audio = new CyberAudio();
        maze = new Maze(9);
        document.getElementById('overlay').style.display = 'none';
        isConnected = true;
        gameLoop();
    } catch(e) { alert(e); }
};
</script>
</body>
</html>
